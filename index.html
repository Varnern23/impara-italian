<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#58cc02" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Impara" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Impara · Learn Languages</title>
<style>
  :root{
    --green:#58cc02; --green-dark:#58a700; --green-shadow:#4caf00;
    --blue:#1cb0f6; --blue-dark:#1899d6;
    --red:#ff4b4b; --red-dark:#ea2b2b;
    --gold:#ffc800; --purple:#ce82ff; --purple-dark:#a568cc;
    --bg:#fff; --bg2:#f7f7f7; --ink:#3c3c3c; --muted:#afafaf;
    --border:#e5e5e5; --card:#fff;
  }
  [data-theme="dark"]{ --bg:#131f24; --bg2:#1b2c34; --ink:#f1f1f1; --muted:#7b8b93; --border:#37464f; --card:#1b2c34; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .2s,color .2s}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  select,input{font-family:inherit}
  .hidden{display:none !important}
  header{width:100%;max-width:640px;display:flex;align-items:center;gap:14px;padding:16px 20px;position:sticky;top:0;background:var(--bg);z-index:10}
  .stat{display:flex;align-items:center;gap:5px;font-weight:800;font-size:17px}
  .stat .ico{font-size:20px}
  .stat.flame{color:#ff9600} .stat.gem{color:var(--blue)} .stat.xp{color:var(--gold)}
  .spacer{flex:1}
  #langSel{font-weight:800;font-size:15px;border:2px solid var(--border);border-radius:10px;padding:5px 6px;background:var(--card);color:var(--ink)}
  .theme-btn{font-size:22px;opacity:.7}
  main{width:100%;max-width:640px;padding:0 20px 130px;flex:1}

  .goal-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 16px;margin:14px 0 4px;display:flex;align-items:center;gap:14px}
  .ring{--p:0;width:54px;height:54px;border-radius:50%;background:conic-gradient(var(--green) calc(var(--p)*1%),var(--border) 0);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .ring span{width:42px;height:42px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:18px}
  .goal-card .gt{font-weight:800} .goal-card .gd{font-size:13px;color:var(--muted);font-weight:600}

  .section-head{display:flex;align-items:center;gap:10px;margin:22px 0 8px;font-weight:800;color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.5px}
  .section-head .line{flex:1;height:2px;background:var(--border)}
  .unit-banner{color:#fff;border-radius:16px;padding:16px 20px;margin:14px 0 22px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .unit-banner h2{font-size:13px;opacity:.9;font-weight:700}
  .unit-banner h1{font-size:19px;margin-top:2px}
  .unit-banner .guide{font-size:18px;background:rgba(255,255,255,.2);padding:8px 12px;border-radius:12px;font-weight:700;white-space:nowrap}
  .unit-prog{font-size:12px;opacity:.9;font-weight:700;margin-top:3px}

  .path{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:14px}
  .node-wrap{display:flex;flex-direction:column;align-items:center;position:relative}
  .node{width:66px;height:60px;border-radius:50%;font-size:26px;display:flex;align-items:center;justify-content:center;transition:transform .08s;color:#fff}
  .node:active{transform:translateY(3px)}
  .node.done{background:var(--gold);box-shadow:0 6px 0 #e0a800}
  .node.current{background:var(--green);box-shadow:0 6px 0 var(--green-shadow)}
  .node.locked{background:#c9c9c9;box-shadow:0 6px 0 #b0b0b0}
  .node.conj{background:var(--purple);box-shadow:0 6px 0 var(--purple-dark)}
  .node-label{font-size:11px;color:var(--muted);font-weight:700;margin:3px 0 8px;max-width:150px;text-align:center}

  #lesson{width:100%;max-width:640px;padding:14px 20px;display:flex;flex-direction:column;min-height:100vh}
  .progress-row{display:flex;align-items:center;gap:14px;margin-bottom:26px}
  .close{font-size:26px;color:var(--muted);font-weight:700;line-height:1}
  .bar{flex:1;height:16px;background:var(--border);border-radius:10px;overflow:hidden}
  .bar > div{height:100%;background:var(--green);border-radius:10px;transition:width .3s;width:0}
  .counter{color:var(--muted);font-weight:800;font-size:16px}
  .q-type{font-size:13px;color:var(--muted);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
  .q-title{font-size:23px;font-weight:800;margin-bottom:24px}

  .audio-row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
  .speaker{display:inline-flex;align-items:center;gap:12px;background:var(--blue);color:#fff;padding:16px 22px;border-radius:16px;font-size:30px;box-shadow:0 4px 0 var(--blue-dark)}
  .speaker.slow{background:var(--muted);box-shadow:0 4px 0 #888;font-size:22px;padding:16px 18px}
  .speaker.mic{background:var(--red);box-shadow:0 4px 0 var(--red-dark);font-size:30px}
  .speaker.mic.live{animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .phrase{font-size:22px;font-weight:700;margin:14px 0 10px;line-height:1.4}
  .reading{font-size:16px;color:var(--blue-dark);font-weight:700;margin-bottom:18px}
  [data-theme="dark"] .reading{color:var(--blue)}
  .ctx{font-size:15px;color:var(--muted);font-weight:600;margin:-2px 0 20px}
  .heard{font-size:15px;font-weight:700;margin:16px 0;padding:12px;border-radius:12px;background:var(--bg2)}

  .choices{display:grid;gap:12px}
  .choice{border:2px solid var(--border);border-bottom-width:4px;border-radius:14px;padding:16px 18px;font-size:18px;font-weight:600;text-align:left;background:var(--card);transition:transform .05s}
  .choice:active{transform:translateY(2px)}
  .choice.sel{border-color:var(--blue);background:#ddf4ff;color:var(--blue-dark)}
  .choice.right{border-color:var(--green);background:#d7ffb8;color:var(--green-dark)}
  .choice.wrong{border-color:var(--red);background:#ffdfe0;color:var(--red-dark)}
  .choice .num{display:inline-block;width:26px;height:26px;border:2px solid var(--border);border-radius:8px;text-align:center;line-height:23px;font-size:13px;margin-right:12px;color:var(--muted)}

  .answer-area{min-height:64px;border-bottom:2px solid var(--border);display:flex;flex-wrap:wrap;gap:8px;padding:10px 0;margin-bottom:22px;align-content:flex-start}
  .bank{display:flex;flex-wrap:wrap;gap:10px}
  .tile{border:2px solid var(--border);border-bottom-width:4px;border-radius:12px;padding:10px 16px;font-size:17px;font-weight:600;background:var(--card)}
  .tile:active{transform:translateY(2px)} .tile.used{visibility:hidden}
  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .match-grid button{border:2px solid var(--border);border-bottom-width:4px;border-radius:12px;padding:16px;font-size:16px;font-weight:600;background:var(--card)}
  .match-grid button.sel{border-color:var(--blue);background:#ddf4ff;color:var(--blue-dark)}
  .match-grid button.gone{opacity:.25;pointer-events:none;border-color:var(--green)}
  .wrong-flash{border-color:var(--red)!important;background:#ffdfe0!important}
  input.type{width:100%;border:2px solid var(--border);border-radius:14px;padding:14px;font-size:18px;outline:none;background:var(--card);color:var(--ink)}
  input.type:focus{border-color:var(--blue)}
  .conj-pronoun{font-size:34px;font-weight:800;margin:6px 0 2px;color:var(--purple)}
  .gender-noun{font-size:34px;font-weight:800;margin:6px 0 18px}

  .foot{margin-top:auto;border-top:2px solid var(--border);padding:18px 0 4px}
  .foot.show-result{margin:0 -20px;padding:18px 20px 22px}
  .foot.correct{background:#d7ffb8} .foot.incorrect{background:#ffdfe0}
  .result-msg{display:flex;align-items:center;gap:12px;font-size:20px;font-weight:800;margin-bottom:14px}
  .result-msg.correct{color:var(--green-dark)} .result-msg.incorrect{color:var(--red-dark)}
  .result-msg .sub{display:block;font-size:14px;font-weight:600;margin-top:2px}
  .btn{width:100%;padding:15px;border-radius:16px;font-size:16px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;background:var(--green);box-shadow:0 4px 0 var(--green-shadow)}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green-shadow)}
  .btn:disabled{background:var(--border);color:var(--muted);box-shadow:0 4px 0 #cfcfcf}
  .btn.skip{background:var(--card);color:var(--muted);box-shadow:0 4px 0 var(--border);border:2px solid var(--border)}
  .btn.red{background:var(--red);box-shadow:0 4px 0 var(--red-dark)}
  .btn.blue{background:var(--blue);box-shadow:0 4px 0 var(--blue-dark)}
  .btn.purple{background:var(--purple);box-shadow:0 4px 0 var(--purple-dark)}

  .center-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:100vh;padding:30px;gap:22px}
  .center-screen h1{font-size:30px;color:var(--gold)}
  .center-screen p{color:var(--muted);font-weight:600;max-width:360px;line-height:1.5}
  .big{font-size:72px}
  .reward-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .reward{border:2px solid var(--gold);border-radius:14px;padding:10px 16px;min-width:120px}
  .reward.blue{border-color:var(--blue)} .reward.purple{border-color:var(--purple)}
  .reward .lbl{font-size:11px;font-weight:800;color:#fff;background:var(--gold);border-radius:8px;padding:3px;letter-spacing:.5px}
  .reward.blue .lbl{background:var(--blue)} .reward.purple .lbl{background:var(--purple)}
  .reward .val{font-size:24px;font-weight:800;margin-top:8px;color:var(--gold)}
  .reward.blue .val{color:var(--blue)} .reward.purple .val{color:var(--purple)}

  .menu-card{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:16px;padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;width:100%;text-align:left}
  .menu-card:active{transform:translateY(2px)}
  .menu-card .mi{font-size:34px} .menu-card .mt{font-size:18px;font-weight:800}
  .menu-card .md{font-size:13px;color:var(--muted);font-weight:600;margin-top:2px}
  .menu-card .badge{margin-left:auto;background:var(--red);color:#fff;font-weight:800;border-radius:20px;padding:4px 12px;font-size:14px}

  .back-btn{font-weight:800;color:var(--muted);margin:8px 0 16px;font-size:15px}
  .search{width:100%;border:2px solid var(--border);border-radius:14px;padding:12px 16px;font-size:16px;background:var(--card);color:var(--ink);margin-bottom:14px;outline:none}
  .search:focus{border-color:var(--blue)}
  .dict-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .dict-row .it{font-weight:800;font-size:17px} .dict-row .en{color:var(--muted);font-weight:600;font-size:14px}
  .dict-row .pl{margin-left:auto;font-size:22px;opacity:.6}
  .kana-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:10px;margin-bottom:18px}
  .kana{background:var(--card);border:2px solid var(--border);border-radius:12px;padding:12px 6px;text-align:center}
  .kana .c{font-size:26px;font-weight:800} .kana .r{font-size:12px;color:var(--muted);font-weight:700;margin-top:4px}

  .acc{background:var(--card);border:2px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
  .acc h3{padding:16px;font-size:16px;font-weight:800;display:flex;justify-content:space-between;align-items:center}
  .acc .body{padding:0 16px 16px;font-size:15px;line-height:1.6}
  .acc .body b{color:var(--green-dark)} .acc .body code{background:var(--bg2);padding:2px 6px;border-radius:6px;font-weight:700}
  .conj-table{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}
  .conj-table th{background:var(--bg2);padding:8px;font-size:12px;text-transform:uppercase;color:var(--muted)}
  .conj-table td{border:1px solid var(--border);padding:10px 8px;text-align:center;font-weight:700}
  .conj-table td:first-child{background:var(--bg2);font-weight:800;color:var(--purple)}
  .conj-table td.tap:active{background:#ddf4ff}
  .story-line{padding:14px 0;border-bottom:1px solid var(--border)}
  .story-line .it{font-size:18px;line-height:1.7;font-weight:600}
  .story-line .it span{padding:1px 2px;border-radius:4px;cursor:pointer}
  .story-line .it span:active{background:#ddf4ff}
  .story-line .en{color:var(--muted);font-size:14px;font-weight:600;margin-top:6px;display:none}
  .story-line.open .en{display:block}
  .story-line .tr{font-size:12px;font-weight:800;color:var(--blue);margin-top:4px}

  nav{position:fixed;bottom:0;width:100%;max-width:640px;display:flex;justify-content:space-around;background:var(--card);border-top:2px solid var(--border);padding:8px 0}
  nav button{font-size:23px;padding:8px 10px;border-radius:12px;opacity:.5;position:relative}
  nav button.active{opacity:1;background:#ddf4ff}
  [data-theme="dark"] nav button.active{background:var(--bg2)}
  nav .ndot{position:absolute;top:2px;right:2px;background:var(--red);color:#fff;font-size:11px;font-weight:800;border-radius:10px;padding:0 5px}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:12px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:50;max-width:90%}
  .toast.show{opacity:1}
  .tip{background:#ddf4ff;border-radius:12px;padding:14px 16px;font-size:14px;color:var(--blue-dark);margin-bottom:20px;font-weight:600}
  [data-theme="dark"] .tip{background:var(--bg2);color:var(--blue)}
  .settings-box{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
  .settings-box label{font-size:13px;font-weight:800;color:var(--muted);display:block;margin-bottom:8px}
  .settings-box select,.settings-box input{width:100%;padding:12px;border-radius:10px;border:2px solid var(--border);background:var(--bg);color:var(--ink);font-size:15px}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
  @keyframes popIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  #qbody{animation:fadeUp .25s ease}
  .center-screen .big{animation:popIn .5s cubic-bezier(.2,1.3,.5,1)}
  .center-screen h1{animation:fadeUp .4s .1s ease both}
  .choice.right{animation:pop .35s ease}
  .foot.incorrect{animation:shake .4s ease}
  #confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:60;display:none}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div id="home">
  <header>
    <div class="stat flame"><span class="ico">🔥</span><span id="streak">0</span></div>
    <div class="stat gem"><span class="ico">💎</span><span id="gems">0</span></div>
    <div class="stat xp"><span class="ico">⭐</span><span id="xpStat">0</span></div>
    <div class="spacer"></div>
    <select id="langSel"></select>
    <button class="theme-btn" id="themeBtn">🌙</button>
  </header>
  <main><div id="path"></div></main>
</div>
<div id="lesson" class="hidden"></div>
<nav id="nav">
  <button data-view="home" class="active">🏠</button>
  <button data-view="learn">📚</button>
  <button data-view="train">🏋️</button>
  <button data-view="review">🔁</button>
  <button data-view="stats">📊</button>
</nav>
<div class="toast" id="toast"></div>
<canvas id="confetti"></canvas>

<script src="data.js"></script>
<script src="data_more.js"></script>
<script src="data_fr.js"></script>
<script>
/* ============================================================
   IMPARA v6 — multi-language trainer
   Italian (full 2000/500) + French, German, Japanese, Korean.
   No hearts. Per-language progress. Per-language TTS.
   ============================================================ */

/* ---------- Italian stories & grammar (other langs carry their own in data_more.js) ---------- */
const STORIES_IT=[
 { title:"Al bar", level:"A1", lines:[["Buongiorno! Un caffè, per favore.","Good morning! A coffee, please."],["Certo. Qualcos'altro?","Of course. Anything else?"],["Sì, anche un cornetto.","Yes, also a croissant."],["Sono tre euro.","That's three euros."],["Ecco a Lei. Grazie!","Here you are. Thank you!"]]},
 { title:"In albergo", level:"A1", lines:[["Buonasera, ho una prenotazione.","Good evening, I have a booking."],["A che nome, prego?","Under what name, please?"],["Mi chiamo Anna Rossi.","My name is Anna Rossi."],["Perfetto, camera dodici. Ecco la chiave.","Perfect, room twelve. Here is the key."],["A che ora è la colazione?","What time is breakfast?"],["Dalle sette alle dieci.","From seven to ten."]]},
 { title:"La famiglia di Luca", level:"A2", lines:[["Luca ha una famiglia grande.","Luca has a big family."],["Suo padre è medico e sua madre è insegnante.","His father is a doctor and his mother is a teacher."],["Ha due sorelle e un fratello.","He has two sisters and a brother."],["La domenica mangiano sempre insieme.","On Sundays they always eat together."],["A Luca piace molto cucinare la pasta.","Luca really likes to cook pasta."]]},
 { title:"Una giornata", level:"A2", lines:[["Ogni mattina mi sveglio alle sette.","Every morning I wake up at seven."],["Faccio colazione e poi vado al lavoro.","I have breakfast and then I go to work."],["Lavoro in un ufficio in centro.","I work in an office downtown."],["La sera torno a casa e leggo un libro.","In the evening I return home and read a book."],["Di solito vado a dormire presto.","I usually go to sleep early."]]},
 { title:"Il viaggio a Roma", level:"B1", lines:[["L'anno scorso sono andato a Roma con un amico.","Last year I went to Rome with a friend."],["Abbiamo visitato il Colosseo e tanti musei.","We visited the Colosseum and many museums."],["Il cibo era delizioso, ma faceva molto caldo.","The food was delicious, but it was very hot."],["Vorrei tornarci il prossimo anno.","I would like to go back next year."],["Roma è una città che non dimenticherò.","Rome is a city I won't forget."]]},
 { title:"Al supermercato", level:"A1", lines:[["Mi serve qualcosa per la cena.","I need something for dinner."],["Dove sono le verdure?","Where are the vegetables?"],["In fondo, a destra.","At the back, on the right."],["Prendo pane, formaggio e pomodori.","I'll get bread, cheese and tomatoes."],["Quanto fa in totale?","How much is it in total?"],["Dodici euro, per favore.","Twelve euros, please."]]},
 { title:"Dal dottore", level:"A2", lines:[["Buongiorno, non mi sento bene.","Good morning, I don't feel well."],["Che cosa ha?","What's wrong?"],["Ho mal di testa e un po' di febbre.","I have a headache and a slight fever."],["Da quanto tempo?","For how long?"],["Da due giorni.","For two days."],["Prenda questa medicina e riposi.","Take this medicine and rest."],["Grazie, dottore.","Thank you, doctor."]]},
 { title:"Che tempo fa?", level:"A1", lines:[["Che tempo fa oggi?","What's the weather like today?"],["C'è il sole, ma fa freddo.","It's sunny, but it's cold."],["Domani pioverà.","Tomorrow it will rain."],["Allora porto l'ombrello.","Then I'll bring an umbrella."],["Buona idea!","Good idea!"]]},
 { title:"Una telefonata", level:"A2", lines:[["Pronto, chi parla?","Hello, who's speaking?"],["Ciao, sono Giulia. C'è Marco?","Hi, it's Giulia. Is Marco there?"],["Un attimo, te lo passo.","One moment, I'll put him on."],["Marco, ti va di uscire stasera?","Marco, do you feel like going out tonight?"],["Volentieri! A che ora?","Gladly! What time?"],["Alle otto, davanti al cinema.","At eight, in front of the cinema."],["Perfetto, ci vediamo lì.","Perfect, see you there."]]},

/* ---------- conjugation (Italian-only gym) ---------- */
const PRONOUNS=["io","tu","lui/lei","noi","voi","loro"];
const TENSES=[{key:"present",name:"Present"},{key:"passato",name:"Passato prossimo"},{key:"imperfetto",name:"Imperfetto"},{key:"futuro",name:"Future"},{key:"condizionale",name:"Conditional"}];
const AUX={ avere:["ho","hai","ha","abbiamo","avete","hanno"], essere:["sono","sei","è","siamo","siete","sono"] };
const REG_PRES={are:["o","i","a","iamo","ate","ano"],ere:["o","i","e","iamo","ete","ono"],ire:["o","i","e","iamo","ite","ono"],isc:["isco","isci","isce","iamo","ite","iscono"]};
const REG_IMP={are:["avo","avi","ava","avamo","avate","avano"],ere:["evo","evi","eva","evamo","evate","evano"],ire:["ivo","ivi","iva","ivamo","ivate","ivano"]};
const FUT_END=["ò","ai","à","emo","ete","anno"], COND_END=["ei","esti","ebbe","emmo","este","ebbero"];
const VERBS=[
  {inf:"parlare",en:"to speak",g:"are",aux:"avere",part:"parlato"},{inf:"lavorare",en:"to work",g:"are",aux:"avere",part:"lavorato"},
  {inf:"credere",en:"to believe",g:"ere",aux:"avere",part:"creduto"},{inf:"dormire",en:"to sleep",g:"ire",aux:"avere",part:"dormito"},
  {inf:"capire",en:"to understand",g:"isc",aux:"avere",part:"capito"},{inf:"partire",en:"to leave",g:"ire",aux:"essere",part:"partito"},
  {inf:"essere",en:"to be",g:"ere",aux:"essere",part:"stato",irr:{present:["sono","sei","è","siamo","siete","sono"],imperfetto:["ero","eri","era","eravamo","eravate","erano"],futuro:["sarò","sarai","sarà","saremo","sarete","saranno"],condizionale:["sarei","saresti","sarebbe","saremmo","sareste","sarebbero"]}},
  {inf:"avere",en:"to have",g:"ere",aux:"avere",part:"avuto",irr:{present:["ho","hai","ha","abbiamo","avete","hanno"],futuro:["avrò","avrai","avrà","avremo","avrete","avranno"],condizionale:["avrei","avresti","avrebbe","avremmo","avreste","avrebbero"]}},
  {inf:"fare",en:"to do/make",g:"are",aux:"avere",part:"fatto",irr:{present:["faccio","fai","fa","facciamo","fate","fanno"],imperfetto:["facevo","facevi","faceva","facevamo","facevate","facevano"],futuro:["farò","farai","farà","faremo","farete","faranno"],condizionale:["farei","faresti","farebbe","faremmo","fareste","farebbero"]}},
  {inf:"andare",en:"to go",g:"are",aux:"essere",part:"andato",irr:{present:["vado","vai","va","andiamo","andate","vanno"],futuro:["andrò","andrai","andrà","andremo","andrete","andranno"],condizionale:["andrei","andresti","andrebbe","andremmo","andreste","andrebbero"]}},
  {inf:"potere",en:"to be able",g:"ere",aux:"avere",part:"potuto",irr:{present:["posso","puoi","può","possiamo","potete","possono"],futuro:["potrò","potrai","potrà","potremo","potrete","potranno"],condizionale:["potrei","potresti","potrebbe","potremmo","potreste","potrebbero"]}},
  {inf:"volere",en:"to want",g:"ere",aux:"avere",part:"voluto",irr:{present:["voglio","vuoi","vuole","vogliamo","volete","vogliono"],futuro:["vorrò","vorrai","vorrà","vorremo","vorrete","vorranno"],condizionale:["vorrei","vorresti","vorrebbe","vorremmo","vorreste","vorrebbero"]}},
  {inf:"dovere",en:"to have to",g:"ere",aux:"avere",part:"dovuto",irr:{present:["devo","devi","deve","dobbiamo","dovete","devono"],futuro:["dovrò","dovrai","dovrà","dovremo","dovrete","dovranno"],condizionale:["dovrei","dovresti","dovrebbe","dovremmo","dovreste","dovrebbero"]}},
  {inf:"venire",en:"to come",g:"ire",aux:"essere",part:"venuto",irr:{present:["vengo","vieni","viene","veniamo","venite","vengono"],futuro:["verrò","verrai","verrà","verremo","verrete","verranno"],condizionale:["verrei","verresti","verrebbe","verremmo","verreste","verrebbero"]}},
];
function vstem(inf){ return inf.slice(0,-3); }
function futBase(v){ let b=v.inf.slice(0,-1); if(v.g==="are") b=b.slice(0,-2)+"er"; return b; }
function conjugate(v,tense){ if(v.irr&&v.irr[tense]) return v.irr[tense];
  if(tense==="present") return REG_PRES[v.g].map(x=>vstem(v.inf)+x);
  if(tense==="imperfetto") return REG_IMP[v.g==="isc"?"ire":v.g].map(x=>vstem(v.inf)+x);
  if(tense==="futuro") return FUT_END.map(x=>futBase(v)+x);
  if(tense==="condizionale") return COND_END.map(x=>futBase(v)+x);
  if(tense==="passato"){ if(v.aux==="essere"){ const b=v.part.slice(0,-1),agr=["o","o","o","i","i","i"]; return AUX.essere.map((a,i)=>a+" "+b+agr[i]); } return AUX.avere.map(a=>a+" "+v.part); }
  return []; }

/* ---------- language registry ---------- */
const COLORS=["var(--green)","var(--blue)","#ff9600","var(--purple)"];
function chunk(a,n){ const o=[]; for(let i=0;i<a.length;i+=n) o.push(a.slice(i,i+n)); return o; }
const LANGS={ it:{code:"it",name:"Italian",flag:"🇮🇹",tts:"it-IT",latin:true,WORD_THEMES:WORD_THEMES,PHRASE_GROUPS:PHRASE_GROUPS,stories:STORIES_IT,grammar:GRAMMAR_IT,alphabets:null}, ...LANG_EXTRA };
const LANG_ORDER=["it","fr","de","ja","ko","hv"];

/* per-course (rebuilt on language switch) */
let LANGMETA,CURRICULUM,ALL_WORDS,ALL_PHRASES,ALL_CARDS,PHRASE_START,STORIES,GRAMMAR,ALPHABETS,GLOSS=null;
function buildCourse(code){ const d=LANGS[code]; LANGMETA=d; CURRICULUM=[];
  d.WORD_THEMES.forEach((t,i)=>CURRICULUM.push({unit:"Words "+(i+1),title:t.cat,guide:"🔤",color:COLORS[i%4],kind:"vocab",lessons:chunk(t.words,8).map((c,j)=>({name:"Set "+(j+1),cards:c}))}));
  PHRASE_START=CURRICULUM.length;
  d.PHRASE_GROUPS.forEach((g,i)=>CURRICULUM.push({unit:"Phrases "+(i+1),title:g.cat,guide:"💬",color:COLORS[(i+1)%4],kind:"phrase",lessons:chunk(g.phrases,5).map((c,j)=>({name:"Set "+(j+1),phrases:c}))}));
  ALL_WORDS=d.WORD_THEMES.flatMap(t=>t.words); ALL_PHRASES=d.PHRASE_GROUPS.flatMap(g=>g.phrases); ALL_CARDS=ALL_WORDS.concat(ALL_PHRASES);
  STORIES=d.stories||[]; GRAMMAR=d.grammar||[]; ALPHABETS=d.alphabets||null; GLOSS=null;
}

/* ---------- gloss for stories ---------- */
const GLOSS_EXTRA={ "un":"a/one","una":"a/one","il":"the","la":"the","lo":"the","le":"the","i":"the","gli":"the","è":"is","ho":"I have","ha":"has","sono":"am/are","mi":"me","sua":"his/her","suo":"his/her","che":"that/which","e":"and","poi":"then","con":"with","molto":"very","sempre":"always","era":"was","insieme":"together","piace":"likes","amico":"friend","scorso":"last","ogni":"every","prego":"please","certo":"of course","ecco":"here is","ma":"but","non":"not","a":"to/at","di":"of","in":"in","vado":"I go","leggo":"I read","faccio":"I do" };
function buildGloss(){ GLOSS={...GLOSS_EXTRA}; ALL_WORDS.forEach(c=>{ const it=c[0].replace(/^(il|lo|la|i|gli|le|l'|un|uno|una|un'|le|der|die|das|le|la|les)\s*/,"").replace(/[?!.]/g,"").toLowerCase(); if(it&&!GLOSS[it]) GLOSS[it]=c[1].replace(/^the\s+/,""); }); }
function glossOf(w){ if(!GLOSS) buildGloss(); return GLOSS[w.toLowerCase().replace(/[.,!?;:"]/g,"")]||null; }

/* ---------- state (per language) + prefs (global) ---------- */
const defState={ xp:0,gems:0,streak:0,lastDay:null,completed:{},srs:{},todayKey:null,todayXp:0,checkpoints:{} };
const PREFS_KEY="impara_prefs", LANG_SEL_KEY="impara_lang";
let PREFS=loadPrefs();
let currentLang=localStorage.getItem(LANG_SEL_KEY)||"it";
if(!LANGS[currentLang]) currentLang="it";
let S;
function loadPrefs(){ try{ const r=JSON.parse(localStorage.getItem(PREFS_KEY)); if(r) return {theme:"light",sound:true,dailyGoal:30,voice:{},...r}; }catch(e){}
  // migrate from old italian save
  try{ const o=JSON.parse(localStorage.getItem("impara_save_v3"))||{}; return {theme:o.theme||"light",sound:o.sound!==false,dailyGoal:o.dailyGoal||30,voice:o.voiceURI?{it:o.voiceURI}:{}}; }catch(e){ return {theme:"light",sound:true,dailyGoal:30,voice:{}}; } }
function savePrefs(){ localStorage.setItem(PREFS_KEY,JSON.stringify(PREFS)); }
function stateKey(code){ return code==="it"?"impara_save_v3":"impara_st_"+code; }
function loadState(code){ try{ const r=JSON.parse(localStorage.getItem(stateKey(code))); return r?{...defState,...r}:{...defState}; }catch(e){ return {...defState}; } }
function save(){ localStorage.setItem(stateKey(currentLang),JSON.stringify(S)); }

function lessonId(u,l){ return u+"-"+l; }
function isDone(u,l){ return !!S.completed[lessonId(u,l)]; }
function totalLessons(){ return CURRICULUM.reduce((a,u)=>a+u.lessons.length,0); }
function doneCount(){ return Object.keys(S.completed).length; }
function unitDone(u){ return CURRICULUM[u].lessons.filter((_,l)=>isDone(u,l)).length; }
function isUnlocked(u,l){ return l===0 || isDone(u,l-1); }
const SRS_GAPS=[0,4*36e5,24*36e5,3*24*36e5,7*24*36e5,21*24*36e5,60*24*36e5];
function srsTouch(it,en,c){ const e=S.srs[it]||{s:0,due:0,en}; e.en=en; e.s=c?Math.min(6,e.s+1):Math.max(0,e.s-1); e.due=Date.now()+SRS_GAPS[e.s]; S.srs[it]=e; }
function dueCount(){ const n=Date.now(); return Object.values(S.srs).filter(e=>e.due<=n).length; }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); }
function bumpStreak(){ const t=todayStr(); if(S.lastDay===t) return; const yd=new Date(Date.now()-864e5); const y=yd.getFullYear()+"-"+yd.getMonth()+"-"+yd.getDate(); S.streak=(S.lastDay===y)?S.streak+1:1; S.lastDay=t; }
function addTodayXp(n){ const t=todayStr(); if(S.todayKey!==t){ S.todayKey=t; S.todayXp=0; } S.todayXp+=n; }
function todayXp(){ return S.todayKey===todayStr()?S.todayXp:0; }

/* ---------- theme/voice ---------- */
function applyTheme(){ document.documentElement.dataset.theme=PREFS.theme; document.getElementById("themeBtn").textContent=PREFS.theme==="dark"?"☀️":"🌙"; }
document.getElementById("themeBtn").onclick=()=>{ PREFS.theme=PREFS.theme==="dark"?"light":"dark"; savePrefs(); applyTheme(); };
let VOICES=[];
function langPrefix(){ return (LANGMETA?LANGMETA.tts:"it-IT").slice(0,2).toLowerCase(); }
function loadVoices(){ const all=window.speechSynthesis?speechSynthesis.getVoices():[]; const p=langPrefix(); VOICES=all.filter(v=>v.lang&&v.lang.toLowerCase().startsWith(p)); }
function scoreVoice(v){ const n=(v.name+" "+v.voiceURI).toLowerCase(); let s=0; if(n.includes("natural")||n.includes("online")) s+=100; if(n.includes("google")) s+=30; if(n.includes("siri")) s+=20; return s; }
function pickVoice(){ loadVoices(); if(!VOICES.length) return null; const sel=PREFS.voice[currentLang]; if(sel){ const m=VOICES.find(v=>v.voiceURI===sel); if(m) return m; } return [...VOICES].sort((a,b)=>scoreVoice(b)-scoreVoice(a))[0]; }
function speak(text,rate){ if(!text||!window.speechSynthesis) return; try{ const u=new SpeechSynthesisUtterance(text); u.lang=LANGMETA?LANGMETA.tts:"it-IT"; u.rate=rate||.9; const v=pickVoice(); if(v) u.voice=v; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){} }
function speakSlow(t){ speak(t,.55); }

/* ---------- language switch ---------- */
function buildLangSel(){ const s=document.getElementById("langSel"); s.innerHTML=LANG_ORDER.map(c=>`<option value="${c}" ${c===currentLang?"selected":""}>${LANGS[c].flag} ${LANGS[c].name}</option>`).join("");
  s.onchange=e=>switchLang(e.target.value); }
function switchLang(code){ currentLang=code; localStorage.setItem(LANG_SEL_KEY,code); S=loadState(code); buildCourse(code); loadVoices(); openUnit=-1; goHome(); toast(LANGS[code].flag+" "+LANGS[code].name); }

/* ---------- HOME ---------- */
let openUnit=-1;
function renderHome(){
  document.getElementById("streak").textContent=S.streak;
  document.getElementById("gems").textContent=S.gems;
  document.getElementById("xpStat").textContent=S.xp;
  const path=document.getElementById("path"); path.innerHTML="";
  const pct=Math.min(100,Math.round(todayXp()/PREFS.dailyGoal*100));
  const goal=document.createElement("div"); goal.className="goal-card";
  goal.innerHTML=`<div class="ring" style="--p:${pct}"><span>${pct>=100?"🏆":"🔥"}</span></div><div><div class="gt">Daily goal: ${todayXp()} / ${PREFS.dailyGoal} XP</div><div class="gd">${pct>=100?"Completed today — bravo!":"Learning "+LANGMETA.name+" "+LANGMETA.flag}</div></div>`;
  path.appendChild(goal);
  function renderUnit(ui){
    const unit=CURRICULUM[ui];
    const b=document.createElement("div"); b.className="unit-banner"; b.style.background=unit.color;
    const done=unitDone(ui),tot=unit.lessons.length;
    b.innerHTML=`<div><h2>${unit.unit}</h2><h1>${unit.title}</h1><div class="unit-prog">${done}/${tot} done${openUnit===ui?" · tap to collapse":""}</div></div><div class="guide">${unit.guide}</div>`;
    b.onclick=()=>{ openUnit=(openUnit===ui?-1:ui); renderHome(); };
    path.appendChild(b);
    if(openUnit!==ui) return;
    const wrap=document.createElement("div"); wrap.className="path";
    unit.lessons.forEach((les,li)=>{
      const d=isDone(ui,li),un=isUnlocked(ui,li);
      const node=document.createElement("div"); node.className="node-wrap";
      node.innerHTML=`<button class="node ${d?"done":(un?"current":"locked")}">${d?"👑":(un?"⭐":"🔒")}</button><div class="node-label">${les.name}</div>`;
      node.querySelector("button").onclick=(un||d)?(()=>startLesson(ui,li)):(()=>toast("Finish the previous set first 🔒"));
      node.style.marginLeft=(li%2?"60px":"-60px"); wrap.appendChild(node);
    });
    path.appendChild(wrap);
  }
  function renderCheckpoint(g){ const [s,e]=checkpointRange(g); const done=!!S.checkpoints[g];
    const allSetsDone=(()=>{ for(let u=s;u<=e;u++){ if(unitDone(u)<CURRICULUM[u].lessons.length) return false; } return true; })();
    const wrap=document.createElement("div"); wrap.className="path";
    const node=document.createElement("div"); node.className="node-wrap";
    node.innerHTML=`<button class="node" style="background:${done?'var(--gold)':'var(--blue)'};box-shadow:0 6px 0 ${done?'#e0a800':'var(--blue-dark)'}">🏁</button><div class="node-label">Checkpoint · Units ${s+1}–${e+1}${allSetsDone?"":" (review)"}</div>`;
    node.querySelector("button").onclick=()=>startCheckpoint(g); wrap.appendChild(node); path.appendChild(wrap); }
  const h1=document.createElement("div"); h1.className="section-head"; h1.innerHTML=`<div class="line"></div>📖 Words<div class="line"></div>`; path.appendChild(h1);
  for(let i=0;i<PHRASE_START;i++){ renderUnit(i); if((i+1)%5===0||i===PHRASE_START-1) renderCheckpoint(Math.floor(i/5)); }
  const h2=document.createElement("div"); h2.className="section-head"; h2.innerHTML=`<div class="line"></div>💬 Phrases<div class="line"></div>`; path.appendChild(h2);
  for(let i=PHRASE_START;i<CURRICULUM.length;i++) renderUnit(i);
  if(currentLang==="it"){
    const h3=document.createElement("div"); h3.className="section-head"; h3.innerHTML=`<div class="line"></div>🏛️ Grammar<div class="line"></div>`; path.appendChild(h3);
    const cb=document.createElement("div"); cb.className="unit-banner"; cb.style.background="var(--purple)";
    cb.innerHTML=`<div><h2>Grammar Gym</h2><h1>Verb Conjugation</h1><div class="unit-prog">5 tenses · 14 verbs</div></div><div class="guide">🔤</div>`;
    cb.onclick=startConjugation; path.appendChild(cb);
  }
  refreshBadges();
}

/* ---------- question builders ---------- */
function sample(arr,n,ex){ return shuffle(arr.filter(x=>x[0]!==ex)).slice(0,n); }
function makeMC(card,pool,dir){ const [it,en,read]=card;
  if(dir==="it2en"){ const opts=shuffle([en,...sample(pool,3,it).map(c=>c[1])]); return {type:"mc",qtype:"Select the meaning",prompt:it,read:read||"",speak:it,options:opts,answer:en,label:"What does this mean?",term:it,termEn:en}; }
  const opts=shuffle([it,...sample(pool,3,it).map(c=>c[0])]); return {type:"mc",qtype:"Select the translation",prompt:en,speak:null,options:opts,answer:it,label:"How do you say this?",term:it,termEn:en}; }
function makeListen(card,pool){ const [it,en,read]=card; const opts=shuffle([en,...sample(pool,3,it).map(c=>c[1])]); return {type:"mc",qtype:"Listening",prompt:"🔊 Tap to listen",speak:it,options:opts,answer:en,label:"What did you hear?",listen:true,term:it,termEn:en}; }
function makeBank(sent){ const [it,en]=sent; const words=it.split(" "); const extra=ALL_WORDS.length?shuffle(ALL_WORDS).slice(0,2).map(c=>c[0].split(" ")[0]):[]; const tiles=shuffle([...words,...extra.filter(w=>!words.includes(w))]); return {type:"bank",qtype:"Build the phrase",prompt:en,speak:it,tiles,answer:words,label:"Translate this phrase",term:it,termEn:en}; }
function makeType(sent){ const [it,en]=sent; return {type:"type",qtype:"Write it",prompt:en,speak:it,answer:it,label:"Write this in "+LANGMETA.name,term:it,termEn:en}; }
function makeMatch(cards){ return {type:"match",qtype:"Match the pairs",pairs:cards.map(c=>({it:c[0],en:c[1]})),label:"Tap the matching pairs"}; }
function makeDictation(sent){ const [it,en]=sent; return {type:"type",qtype:"Dictation",prompt:null,dictation:true,hint:en,speak:it,answer:it,label:"Listen and type what you hear",term:it,termEn:en}; }
function makeSpeak(card){ const [it,en,read]=card; return {type:"speak",qtype:"Speaking",prompt:it,read:read||"",en,speak:it,answer:it,label:"Say this out loud",term:it,termEn:en}; }
function makeNumber(){ const n=Math.floor(Math.random()*101); return {type:"type",qtype:"Numbers",prompt:null,dictation:true,hint:"type the number you hear (digits)",speak:String(n),answer:String(n),term:"num·"+n,termEn:String(n)}; }
function makeConj(){ const v=VERBS[Math.floor(Math.random()*VERBS.length)],t=TENSES[Math.floor(Math.random()*TENSES.length)],idx=Math.floor(Math.random()*6);
  const forms=conjugate(v,t.key),answer=forms[idx]; const wrong=new Set(); forms.forEach((f,i)=>{ if(i!==idx) wrong.add(f); });
  while(wrong.size<3){ const ov=VERBS[Math.floor(Math.random()*VERBS.length)]; const f=conjugate(ov,t.key)[Math.floor(Math.random()*6)]; if(f!==answer) wrong.add(f); }
  return {type:"mc",qtype:"Conjugation · "+t.name,conj:{pronoun:PRONOUNS[idx],inf:v.inf,en:v.en,tense:t.name},options:shuffle([answer,...[...wrong].slice(0,3)]),answer,label:"Choose the correct form",speak:answer.includes(" ")?answer:PRONOUNS[idx].split("/")[0]+" "+answer,term:v.inf+"·"+t.key+"·"+idx,termEn:v.en}; }
function genderItems(){ const out=[]; ALL_WORDS.forEach(c=>{ const m=c[0].match(/^(il|lo|la)\s+(.+)/); if(m) out.push({art:m[1],noun:m[2],en:c[1],full:c[0]}); }); return out; }
function makeGender(item){ return {type:"mc",qtype:"Articles · il / lo / la",gender:{noun:item.noun,en:item.en},options:shuffle(["il","lo","la"]),answer:item.art,label:"Which article?",speak:item.full,term:item.full,termEn:item.en}; }

function makeFlash(card){ const [it,en,read]=card; return {type:"flash",qtype:"New",label:"Learn this word",native:it,read:read||"",en,speak:it}; }
function buildQueue(unit,lesson){
  const les=CURRICULUM[unit].lessons[lesson]; const latin=LANGMETA.latin; const teach=[],quiz=[];
  if(les.cards){ const pool=ALL_WORDS;
    les.cards.forEach(c=>teach.push(makeFlash(c)));                       // 1) learn each word first
    les.cards.forEach(c=>quiz.push(makeMC(c,pool,"it2en")));
    les.cards.filter((_,i)=>i%2===0).forEach(c=>quiz.push(makeMC(c,pool,"en2it")));
    les.cards.filter((_,i)=>i%2===1).forEach(c=>quiz.push(makeListen(c,pool)));
    if(latin) les.cards.filter((_,i)=>i%3===0).forEach(c=>quiz.push(makeType(c)));
    quiz.push(makeMatch(les.cards.slice(0,5)));
  } else { const pool=ALL_PHRASES;
    les.phrases.forEach(p=>teach.push(makeFlash(p)));
    les.phrases.forEach(p=>quiz.push(makeListen(p,pool)));
    les.phrases.forEach(p=>quiz.push(makeBank(p)));
    if(latin) les.phrases.filter((_,i)=>i%2===0).forEach(p=>quiz.push(makeType(p)));
    quiz.push(makeMatch(les.phrases.slice(0,5)));
  }
  return teach.concat(shuffle(quiz));                                     // teach in order, then quiz shuffled
}
/* checkpoints: cumulative review over a group of 5 vocab units */
function checkpointRange(g){ const start=g*5,end=Math.min(start+4,PHRASE_START-1); return [start,end]; }
function checkpointCards(g){ const [s,e]=checkpointRange(g); let cards=[]; for(let u=s;u<=e;u++) CURRICULUM[u].lessons.forEach(l=>cards.push(...(l.cards||[]))); return cards; }
function startCheckpoint(g){ const cards=checkpointCards(g); if(cards.length<4){ toast("Finish some sets in this section first 🏁"); return; }
  const pick=shuffle(cards).slice(0,14); const q=pick.map(c=>{ const r=Math.random(); return r<0.34?makeMC(c,ALL_WORDS,"it2en"):(r<0.67?makeMC(c,ALL_WORDS,"en2it"):makeListen(c,ALL_WORDS)); });
  q.push(makeMatch(shuffle(cards).slice(0,5)));
  L={queue:shuffle(q),i:0,correct:0,mistakes:0,wrongQ:[],mode:"checkpoint",cp:g}; show("lesson"); renderQuestion(); }

/* ---------- SESSION ---------- */
let L=null;
function startLesson(u,l){ L={unit:u,lesson:l,queue:buildQueue(u,l),i:0,correct:0,mistakes:0,wrongQ:[],mode:"lesson"}; show("lesson"); renderQuestion(); }
function startConjugation(){ const q=[]; for(let k=0;k<15;k++) q.push(makeConj()); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"conj"}; show("lesson"); renderQuestion(); }
function startPractice(){ const done=Object.keys(S.completed).map(k=>k.split("-").map(Number)); let q=[];
  if(done.length){ shuffle(done).slice(0,4).forEach(([u,l])=>{ if(CURRICULUM[u]&&CURRICULUM[u].lessons[l]) q.push(...buildQueue(u,l)); }); }
  else q=buildQueue(0,0); q=shuffle(q).slice(0,14); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"practice"}; show("lesson"); renderQuestion(); }
function startReview(){ const n=Date.now(); let due=Object.entries(S.srs).filter(([it,e])=>e.due<=n&&!it.startsWith("num·")&&!it.includes("·")).map(([it,e])=>[it,e.en]); if(!due.length){ toast("Nothing due! Come back later 🔁"); return; } due=shuffle(due).slice(0,15); const q=due.map(c=>Math.random()<.5?makeMC(c,ALL_CARDS,"it2en"):makeMC(c,ALL_CARDS,"en2it")); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"review"}; show("lesson"); renderQuestion(); }
function startDictation(){ let q; if(LANGMETA.latin) q=shuffle(ALL_PHRASES).slice(0,10).map(makeDictation); else q=shuffle(ALL_PHRASES).slice(0,10).map(p=>makeListen(p,ALL_PHRASES)); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"dictation"}; show("lesson"); renderQuestion(); }
function startGender(){ const q=shuffle(genderItems()).slice(0,15).map(makeGender); if(!q.length){ toast("Not available for this language"); return; } L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"gender"}; show("lesson"); renderQuestion(); }
function startHardest(){ const e=Object.entries(S.srs).filter(([it])=>!it.startsWith("num·")&&!it.includes("·")); if(e.length<4){ toast("Learn a few sets first 🧠"); return; } const sorted=e.sort((a,b)=>(a[1].s-b[1].s)||(a[1].due-b[1].due)).slice(0,15).map(([it,x])=>[it,x.en]); const q=sorted.map(c=>Math.random()<.5?makeMC(c,ALL_CARDS,"en2it"):makeMC(c,ALL_CARDS,"it2en")); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"hardest"}; show("lesson"); renderQuestion(); }
function startSpeaking(){ const q=shuffle(ALL_CARDS).slice(0,10).map(makeSpeak); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"speaking"}; show("lesson"); renderQuestion(); }
function startNumbers(){ const q=[]; for(let k=0;k<12;k++) q.push(makeNumber()); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"numbers"}; show("lesson"); renderQuestion(); }

function show(view){ document.getElementById("home").classList.toggle("hidden",view!=="home"); document.getElementById("lesson").classList.toggle("hidden",view!=="lesson"); document.getElementById("nav").classList.toggle("hidden",view==="lesson"); }

function renderQuestion(){
  const el=document.getElementById("lesson"),q=L.queue[L.i],pct=Math.round((L.i/L.queue.length)*100);
  el.innerHTML=`<div class="progress-row"><button class="close" id="closeBtn">✕</button><div class="bar"><div style="width:${pct}%"></div></div><div class="counter">${L.i+1}/${L.queue.length}</div></div>
    <div class="q-type">${q.qtype}</div><div class="q-title">${q.label}</div><div id="qbody"></div>
    <div class="foot" id="foot"><button class="btn" id="checkBtn" disabled>Check</button></div>`;
  document.getElementById("closeBtn").onclick=()=>{ if(confirm("Quit? This session's progress is lost.")) goHome(); };
  const body=document.getElementById("qbody");
  if(q.type==="mc") renderMC(q,body);
  else if(q.type==="bank") renderBank(q,body);
  else if(q.type==="type") renderType(q,body);
  else if(q.type==="match") renderMatch(q,body);
  else if(q.type==="speak") renderSpeak(q,body);
  else if(q.type==="flash") renderFlash(q,body);
}
function renderFlash(q,body){
  body.innerHTML=`${audioControls(q,true)}<div class="phrase" style="font-size:30px;margin-bottom:8px">${q.native}</div>${q.read?`<div class="reading">${q.read}</div>`:""}<div class="ctx" style="font-size:20px;color:var(--ink);font-weight:700;margin-top:4px">${q.en}</div><div class="tip" style="margin-top:24px">👀 Learn this one — then you'll be quizzed on it.</div>`;
  wireAudio(q); speak(q.speak);
  const foot=document.getElementById("foot"); foot.innerHTML=`<button class="btn blue" id="contBtn">Got it 👍</button>`;
  document.getElementById("contBtn").onclick=next;
}
function audioControls(q,withSlow){ return `<div class="audio-row"><button class="speaker" id="spk">🔊</button>${withSlow?`<button class="speaker slow" id="slow">🐢</button>`:""}</div>`; }
function wireAudio(q){ const s=document.getElementById("spk"); if(s) s.onclick=()=>speak(q.speak); const sl=document.getElementById("slow"); if(sl) sl.onclick=()=>speakSlow(q.speak); }
function renderMC(q,body){
  let sel=null,head="";
  if(q.conj) head=`<div class="ctx">${q.conj.inf} — ${q.conj.en} · <b>${q.conj.tense}</b></div><div class="conj-pronoun">${q.conj.pronoun} ___</div>`;
  else if(q.gender) head=`<div class="ctx">${q.gender.en}</div><div class="gender-noun">___ ${q.gender.noun}</div>`;
  else head=(q.speak?audioControls(q,q.listen):"")+(q.listen?"":`<div class="phrase">${q.prompt}</div>${q.read?`<div class="reading">${q.read}</div>`:""}`);
  body.innerHTML=`${head}<div class="choices"></div>`;
  if(q.speak&&!q.conj&&!q.gender){ wireAudio(q); if(q.listen) speak(q.speak); }
  const wrap=body.querySelector(".choices");
  q.options.forEach((opt,i)=>{ const b=document.createElement("button"); b.className="choice"; b.innerHTML=`<span class="num">${i+1}</span>${opt}`; b.onclick=()=>{ sel=opt; [...wrap.children].forEach(c=>c.classList.remove("sel")); b.classList.add("sel"); enableCheck(); }; wrap.appendChild(b); });
  setCheck(()=>{ const right=sel===q.answer; [...wrap.children].forEach(c=>{ const t=c.textContent.replace(/^\d/,"").trim(); if(t===q.answer) c.classList.add("right"); else if(t===sel) c.classList.add("wrong"); c.style.pointerEvents="none"; }); return {right,correct:q.gender?(q.answer+" "+q.gender.noun):q.answer}; },()=>sel!==null);
}
function renderBank(q,body){
  body.innerHTML=`${audioControls(q,true)}<div class="phrase">${q.prompt}</div><div class="answer-area" id="ans"></div><div class="bank" id="bank"></div>`; wireAudio(q);
  const ans=document.getElementById("ans"),bank=document.getElementById("bank");
  q.tiles.forEach(w=>{ const t=document.createElement("button"); t.className="tile"; t.textContent=w; t.onclick=()=>{ t.classList.add("used"); const a=document.createElement("button"); a.className="tile"; a.textContent=w; a.onclick=()=>{ a.remove(); t.classList.remove("used"); enableCheck(); }; ans.appendChild(a); enableCheck(); }; bank.appendChild(t); });
  setCheck(()=>{ const got=[...ans.children].map(c=>c.textContent); return {right:got.join(" ")===q.answer.join(" "),correct:q.answer.join(" ")}; },()=>ans.children.length>0);
}
function renderType(q,body){
  const head=q.dictation?`${audioControls(q,true)}<div class="ctx">${q.hint}</div>`:`${audioControls(q,true)}<div class="phrase">${q.prompt}</div>`;
  body.innerHTML=`${head}<div class="tip">Accents &amp; capitals optional.</div><input class="type" id="typed" placeholder="Type here…" autocomplete="off" autocapitalize="off"/>`;
  wireAudio(q); if(q.dictation) speak(q.speak);
  const inp=document.getElementById("typed"); inp.oninput=()=>{ inp.value.trim()?enableCheck():disableCheck(); }; inp.onkeydown=e=>{ if(e.key==="Enter"&&!document.getElementById("checkBtn").disabled) doCheck(); }; inp.focus();
  const norm=s=>s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[.,!?;'’]/g,"").replace(/\s+/g," ").trim();
  setCheck(()=>({right:norm(inp.value)===norm(q.answer),correct:q.answer}),()=>inp.value.trim().length>0);
}
function renderMatch(q,body){
  const left=shuffle(q.pairs.map(p=>p.it)),right=shuffle(q.pairs.map(p=>p.en));
  body.innerHTML=`<div class="match-grid" id="mg"></div>`; const mg=document.getElementById("mg");
  const make=(t,s)=>{ const b=document.createElement("button"); b.textContent=t; b.dataset.side=s; b.dataset.text=t; return b; };
  const items=[]; for(let i=0;i<q.pairs.length;i++){ items.push(make(left[i],"it")); items.push(make(right[i],"en")); }
  let selBtn=null,solved=0;
  items.forEach(b=>{ b.onclick=()=>{ if(b.dataset.side==="it") speak(b.dataset.text);
    if(selBtn===b){ b.classList.remove("sel"); selBtn=null; return; }
    if(!selBtn){ selBtn=b; b.classList.add("sel"); return; }
    if(selBtn.dataset.side===b.dataset.side){ selBtn.classList.remove("sel"); selBtn=b; b.classList.add("sel"); return; }
    const itTxt=selBtn.dataset.side==="it"?selBtn.dataset.text:b.dataset.text,enTxt=selBtn.dataset.side==="en"?selBtn.dataset.text:b.dataset.text;
    if(q.pairs.some(p=>p.it===itTxt&&p.en===enTxt)){ selBtn.classList.add("gone"); b.classList.add("gone"); selBtn.classList.remove("sel"); selBtn=null; solved++; if(solved===q.pairs.length) enableCheck(); }
    else { const a=selBtn; a.classList.add("wrong-flash"); b.classList.add("wrong-flash"); setTimeout(()=>{a.classList.remove("sel","wrong-flash"); b.classList.remove("wrong-flash");},400); selBtn=null; toast("Not a match"); }
  }; mg.appendChild(b); });
  setCheck(()=>({right:true,correct:""}),()=>solved===q.pairs.length);
}
function renderSpeak(q,body){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const supported=!!SR && window.isSecureContext;
  body.innerHTML=`${audioControls(q,true)}<div class="phrase">${q.prompt}</div>${q.read?`<div class="reading">${q.read}</div>`:""}<div class="ctx">${q.en}</div>
    <div style="text-align:center;margin:10px 0"><button class="speaker mic" id="mic" style="font-size:34px;padding:22px 28px">🎤</button>
    <div class="gd" style="color:var(--muted);font-weight:700;margin-top:10px" id="micHint">${supported?"Tap the mic and say it":"🎤 needs the online site in Chrome/Edge/Android with mic permission"}</div></div>
    <div class="heard" id="heard" style="display:none"></div>`;
  wireAudio(q); speak(q.speak);
  const foot=document.getElementById("foot");
  foot.innerHTML=`<button class="btn" id="saidBtn">I said it ✓</button><button class="btn skip" id="skipBtn" style="margin-top:10px">Skip</button>`;
  document.getElementById("saidBtn").onclick=()=>evalSpeak(true,q);
  document.getElementById("skipBtn").onclick=()=>evalSpeak(false,q);
  const mic=document.getElementById("mic"),hint=document.getElementById("micHint");
  mic.onclick=()=>{ speak(q.speak); if(!supported){ toast("Open the online site in Chrome/Edge for voice input"); return; }
    let rec; try{ rec=new SR(); }catch(e){ toast("Speech input unavailable here"); return; }
    rec.lang=LANGMETA.tts; rec.interimResults=true; rec.maxAlternatives=3; rec.continuous=false;
    let got=false; mic.classList.add("live"); hint.textContent="Listening… speak now";
    rec.onresult=e=>{ const res=e.results[e.results.length-1]; const alts=[...res].map(r=>r.transcript);
      if(!res.isFinal){ const h=document.getElementById("heard"); h.style.display="block"; h.innerHTML=`…${alts[0]}`; return; }
      got=true; const norm=s=>s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[.,!?;'’、。]/g,"").replace(/\s+/g,"").trim();
      const target=norm(q.answer); let best=0,heard=alts[0]; alts.forEach(a=>{ const A=norm(a); let sc=0; if(A===target) sc=1; else { let m=0; for(const ch of new Set(target)) if(A.includes(ch)) m++; sc=m/Math.max(1,new Set(target).size); } if(sc>best){best=sc;heard=a;} });
      mic.classList.remove("live"); const h=document.getElementById("heard"); h.style.display="block"; h.innerHTML=`You said: <b>${heard}</b>`; evalSpeak(best>=0.6,q); };
    rec.onerror=ev=>{ mic.classList.remove("live"); hint.textContent = ev.error==="not-allowed"?"Microphone blocked — allow mic access in your browser":(ev.error==="no-speech"?"Didn't hear anything — tap to retry":"Tap to retry"); };
    rec.onend=()=>{ mic.classList.remove("live"); if(!got&&hint.textContent.startsWith("Listening")) hint.textContent="Didn't catch that — tap to retry"; };
    try{ rec.start(); }catch(e){ mic.classList.remove("live"); } };
}
function evalSpeak(right,q){ sfx(right?"correct":"wrong"); if(right) L.correct++; else { L.mistakes++; L.wrongQ.push(q); } if(q.term) srsTouch(q.term,q.termEn||"",right); save();
  const foot=document.getElementById("foot"); foot.className="foot show-result "+(right?"correct":"incorrect");
  foot.innerHTML=`<div class="result-msg ${right?'correct':'incorrect'}">${right?"✅ Bravo!":"❌ Target:"}${right?"":`<span class="sub">${q.answer}</span>`}</div><button class="btn ${right?'':'red'}" id="contBtn">Continue</button>`;
  document.getElementById("contBtn").onclick=next; }

let _checkFn=null,_canCheck=null;
function setCheck(fn,can){ _checkFn=fn; _canCheck=can; const cb=document.getElementById("checkBtn"); if(cb) cb.onclick=doCheck; }
function enableCheck(){ if(_canCheck&&_canCheck()){ const b=document.getElementById("checkBtn"); if(b) b.disabled=false; } }
function disableCheck(){ const b=document.getElementById("checkBtn"); if(b) b.disabled=true; }
function doCheck(){ const {right,correct}=_checkFn(),q=L.queue[L.i];
  if(right) L.correct++; else { L.mistakes++; L.wrongQ.push(q); }
  if(q.term) srsTouch(q.term,q.termEn||"",right); if(right&&q.speak) speak(q.speak); showResult(right,correct); save(); }
function showResult(right,correct){ sfx(right?"correct":"wrong"); const foot=document.getElementById("foot"); foot.className="foot show-result "+(right?"correct":"incorrect");
  foot.innerHTML=`<div class="result-msg ${right?'correct':'incorrect'}">${right?"✅ Bravo!":"❌ Correct answer:"}${right?"":`<span class="sub">${correct}</span>`}</div><button class="btn ${right?'':'red'}" id="contBtn">Continue</button>`;
  document.getElementById("contBtn").onclick=next; }
function next(){ L.i++; if(L.i>=L.queue.length){ if(L.wrongQ.length){ L.queue.push(...L.wrongQ); L.wrongQ=[]; renderQuestion(); return; } return completeSession(); } renderQuestion(); }

function completeSession(){
  const acc=Math.round((L.correct/(L.correct+L.mistakes||1))*100); bumpStreak(); let html,gained=0;
  if(L.mode==="conj"){ gained=20; S.gems+=10; html=`<div class="big">🏛️</div><h1 style="color:var(--purple)">Conjugation mastered!</h1>`; }
  else if(L.mode==="practice"){ gained=12; S.gems+=8; html=`<div class="big">🎯</div><h1 style="color:var(--blue)">Practice complete!</h1>`; }
  else if(L.mode==="review"||L.mode==="hardest"){ gained=15; S.gems+=8; html=`<div class="big">${L.mode==="hardest"?"🧠":"🔁"}</div><h1 style="color:var(--green)">${L.mode==="hardest"?"Tough words tackled!":"Review done!"}</h1>`; }
  else if(L.mode==="dictation"||L.mode==="gender"||L.mode==="numbers"){ gained=L.mode==="numbers"?10:15; S.gems+=6; const ico=L.mode==="dictation"?"🎧":(L.mode==="numbers"?"🔢":"⚖️"); html=`<div class="big">${ico}</div><h1 style="color:var(--blue)">Nice work!</h1>`; }
  else if(L.mode==="speaking"){ gained=15; S.gems+=8; html=`<div class="big">🗣️</div><h1 style="color:var(--red)">Speaking done!</h1>`; }
  else if(L.mode==="checkpoint"){ gained=30; S.gems+=15; S.checkpoints[L.cp]=true; html=`<div class="big">🏁</div><h1 style="color:var(--gold)">Checkpoint cleared!</h1>`; }
  else { gained=15+(L.mistakes===0?5:0); S.gems+=10; S.completed[lessonId(L.unit,L.lesson)]=true; html=`<div class="big">🎉</div><h1>Set complete!</h1>`; }
  html+=`<div class="reward-row"><div class="reward"><div class="lbl">XP</div><div class="val">+${gained||0}</div></div><div class="reward blue"><div class="lbl">ACCURACY</div><div class="val">${acc}%</div></div></div>`;
  if(gained){ S.xp+=gained; addTodayXp(gained); } save();
  const goalHit=todayXp()>=PREFS.dailyGoal&&todayXp()-gained<PREFS.dailyGoal;
  document.getElementById("lesson").innerHTML=`<div class="center-screen">${html}${goalHit?'<p style="color:var(--gold);font-weight:800">🏆 Daily goal reached!</p>':''}<button class="btn" style="max-width:280px" id="doneBtn">Continue</button></div>`;
  sfx("complete"); confetti(); document.getElementById("doneBtn").onclick=goHome;
}
function goHome(){ show("home"); document.querySelector("#home main").innerHTML='<div id="path"></div>'; renderHome(); setNav("home"); }

  document.querySelector("#home main").innerHTML=`

    <button class="menu-card" id="m-gen"><span class="mi">⚖️</span><span><span class="mt">Il / Lo / La</span><span class="md">Noun gender &amp; articles</span></span></button>`:""}
    <button class="menu-card" id="m-num"><span class="mi">🔢</span><span><span class="mt">Numbers</span><span class="md">Listen and type numbers 0–100</span></span></button>
    <button class="menu-card" id="m-hard"><span class="mi">🧠</span><span><span class="mt">Hardest Words</span><span class="md">Targets your weakest vocabulary</span></span></button>
    <button class="menu-card" id="m-rev"><span class="mi">🔁</span><span><span class="mt">Spaced Review</span><span class="md">Words due for revision</span></span>${due?`<span class="badge">${due}</span>`:""}</button>`;
  const map={ "m-prac":startPractice,"m-speak":startSpeaking,"m-dict":startDictation,"m-conj":startConjugation,"m-gen":startGender,"m-num":startNumbers,"m-hard":startHardest,"m-rev":startReview };
  Object.entries(map).forEach(([id,fn])=>{ const el=document.getElementById(id); if(el) el.onclick=fn; });
}

/* ---------- LEARN ---------- */
function showLearn(){ show("home");
  document.querySelector("#home main").innerHTML=`
    <div class="unit-banner" style="background:var(--green)"><div><h2>Reference &amp; reading</h2><h1>Learn 📚</h1></div></div>
    ${ALPHABETS?`<button class="menu-card" id="l-alpha"><span class="mi">🔠</span><span><span class="mt">Alphabet / Script</span><span class="md">${ALPHABETS.map(a=>a.name.split(" ")[0]).join(" · ")}</span></span></button>`:""}
    <button class="menu-card" id="l-story"><span class="mi">📖</span><span><span class="mt">Stories</span><span class="md">${STORIES.length} readings · tap any word</span></span></button>
    <button class="menu-card" id="l-dict"><span class="mi">📒</span><span><span class="mt">Dictionary</span><span class="md">All ${ALL_WORDS.length} words · tap to hear</span></span></button>
    <button class="menu-card" id="l-phr"><span class="mi">💬</span><span><span class="mt">Phrasebook</span><span class="md">All ${ALL_PHRASES.length} phrases · tap to hear</span></span></button>
    <button class="menu-card" id="l-gram"><span class="mi">📐</span><span><span class="mt">Grammar Notes</span><span class="md">${GRAMMAR.length} explanations</span></span></button>
    ${currentLang==="it"?`<button class="menu-card" id="l-conj"><span class="mi">📋</span><span><span class="mt">Conjugation Tables</span><span class="md">14 verbs · 5 tenses</span></span></button>`:""}`;
  if(ALPHABETS) document.getElementById("l-alpha").onclick=showAlphabets;
  document.getElementById("l-story").onclick=showStories;
  document.getElementById("l-dict").onclick=()=>showWordList("Dictionary 📒",ALL_WORDS,"Search…");
  document.getElementById("l-phr").onclick=()=>showWordList("Phrasebook 💬",ALL_PHRASES,"Search phrases…");
  document.getElementById("l-gram").onclick=showGrammar;
  const cj=document.getElementById("l-conj"); if(cj) cj.onclick=showConjTables;
}
function backBtn(fn){ const b=document.createElement("button"); b.className="back-btn"; b.textContent="‹ Back"; b.onclick=fn; return b; }
function showAlphabets(){ const m=document.querySelector("#home main"); m.innerHTML=`<div class="unit-banner" style="background:var(--purple)"><div><h2>Tap to hear</h2><h1>Alphabet 🔠</h1></div></div>`; m.prepend(backBtn(showLearn));
  ALPHABETS.forEach(a=>{ const h=document.createElement("div"); h.className="section-head"; h.innerHTML=`<div class="line"></div>${a.name}<div class="line"></div>`; m.appendChild(h);
    const g=document.createElement("div"); g.className="kana-grid"; a.chars.forEach(([r,c])=>{ const k=document.createElement("button"); k.className="kana"; k.innerHTML=`<div class="c">${c}</div><div class="r">${r}</div>`; k.onclick=()=>speak(c); g.appendChild(k); }); m.appendChild(g); });
}
function showWordList(title,data,ph){ const m=document.querySelector("#home main"); const all=[...data].sort((a,b)=>a[0].localeCompare(b[0]));
  m.innerHTML=`<div class="unit-banner" style="background:var(--green)"><div><h2>${all.length} entries</h2><h1>${title}</h1></div></div><input class="search" id="dq" placeholder="${ph}"/><div id="dlist"></div>`;
  m.prepend(backBtn(showLearn)); const list=document.getElementById("dlist");
  function draw(f){ f=(f||"").toLowerCase(); list.innerHTML=""; all.filter(c=>!f||c[0].toLowerCase().includes(f)||c[1].toLowerCase().includes(f)||(c[2]&&c[2].toLowerCase().includes(f))).slice(0,400).forEach(c=>{ const r=document.createElement("div"); r.className="dict-row"; r.innerHTML=`<div><div class="it">${c[0]}</div><div class="en">${c[1]}${c[2]?" · "+c[2]:""}</div></div><div class="pl">🔊</div>`; r.onclick=()=>speak(c[0]); list.appendChild(r); }); }
  draw(""); document.getElementById("dq").oninput=e=>draw(e.target.value);
}
function showGrammar(){ const m=document.querySelector("#home main"); m.innerHTML=`<div class="unit-banner" style="background:var(--green)"><div><h2>${LANGMETA.name} reference</h2><h1>Grammar 📐</h1></div></div>`; m.prepend(backBtn(showLearn));
  if(!GRAMMAR.length){ const p=document.createElement("p"); p.style.cssText="color:var(--muted);font-weight:600;padding:20px"; p.textContent="Grammar notes coming soon for this language."; m.appendChild(p); return; }
  GRAMMAR.forEach(g=>{ const a=document.createElement("div"); a.className="acc"; a.innerHTML=`<h3>${g.t}<span>▾</span></h3><div class="body hidden">${g.b}</div>`; const h=a.querySelector("h3"),bd=a.querySelector(".body"),ar=a.querySelector("span"); h.onclick=()=>{ bd.classList.toggle("hidden"); ar.textContent=bd.classList.contains("hidden")?"▾":"▴"; }; m.appendChild(a); });
}
function showConjTables(){ const m=document.querySelector("#home main"); const opts=VERBS.map((v,i)=>`<option value="${i}">${v.inf} — ${v.en}</option>`).join("");
  m.innerHTML=`<div class="unit-banner" style="background:var(--purple)"><div><h2>Tap a form to hear it</h2><h1>Conjugation 📋</h1></div></div><div class="settings-box"><label>Verb</label><select id="vsel">${opts}</select></div><div id="ctbl"></div>`;
  m.prepend(backBtn(showLearn));
  function draw(i){ const v=VERBS[i],tbl=document.getElementById("ctbl"),cols=TENSES.map(t=>conjugate(v,t.key));
    let h=`<table class="conj-table"><tr><th></th>${TENSES.map(t=>`<th>${t.name}</th>`).join("")}</tr>`;
    for(let r=0;r<6;r++) h+=`<tr><td>${PRONOUNS[r]}</td>${cols.map(c=>`<td class="tap" data-f="${c[r]}">${c[r]}</td>`).join("")}</tr>`;
    h+=`</table>`; tbl.innerHTML=h; tbl.querySelectorAll(".tap").forEach(td=>td.onclick=()=>speak(td.dataset.f)); }
  draw(0); document.getElementById("vsel").onchange=e=>draw(+e.target.value);
}
function showStories(){ const m=document.querySelector("#home main"); m.innerHTML=`<div class="unit-banner" style="background:var(--green)"><div><h2>Comprehensible input</h2><h1>Stories 📖</h1></div></div>`; m.prepend(backBtn(showLearn));
  if(!STORIES.length){ const p=document.createElement("p"); p.style.cssText="color:var(--muted);font-weight:600;padding:20px"; p.textContent="Stories coming soon for this language."; m.appendChild(p); return; }
  STORIES.forEach((s,i)=>{ const c=document.createElement("button"); c.className="menu-card"; c.innerHTML=`<span class="mi">📖</span><span><span class="mt">${s.title}</span><span class="md">${s.level} · ${s.lines.length} lines</span></span>`; c.onclick=()=>openStory(i); m.appendChild(c); });
}
function openStory(i){ const s=STORIES[i],m=document.querySelector("#home main");
  m.innerHTML=`<div class="unit-banner" style="background:var(--green)"><div><h2>${s.level}</h2><h1>${s.title}</h1></div><div class="guide" id="playAll">▶</div></div><div class="tip">Tap a sentence to translate · tap a word to hear it.</div><div id="slines"></div>`;
  m.prepend(backBtn(showStories)); const cont=document.getElementById("slines");
  s.lines.forEach(([it,en])=>{ const row=document.createElement("div"); row.className="story-line"; row.innerHTML=`<div class="it">${it.split(" ").map(w=>`<span>${w}</span>`).join(" ")}</div><div class="tr">tap to translate ▾</div><div class="en">${en}</div>`;
    row.querySelector(".tr").onclick=()=>row.classList.toggle("open");
    row.querySelectorAll(".it span").forEach(sp=>{ sp.onclick=ev=>{ ev.stopPropagation(); const w=sp.textContent; speak(w); const g=glossOf(w); toast(g?`${w} = ${g}`:`🔊 ${w}`); }; });
    cont.appendChild(row); });
  document.getElementById("playAll").onclick=()=>playStory(s);
}
function playStory(s){ let k=0; const u=()=>{ if(k>=s.lines.length||!window.speechSynthesis) return; const utt=new SpeechSynthesisUtterance(s.lines[k][0]); utt.lang=LANGMETA.tts; utt.rate=.9; const v=pickVoice(); if(v)utt.voice=v; utt.onend=()=>{ k++; u(); }; speechSynthesis.speak(utt); }; speechSynthesis.cancel(); u(); }

/* ---------- STATS ---------- */
function showStats(){ show("home"); loadVoices();
  const lvl=Math.floor(S.xp/100)+1,into=S.xp%100;
  const strong=Object.values(S.srs).filter(e=>e.s>=4).length,learning=Object.keys(S.srs).length;
  const best=pickVoice(); const voiceOpts=VOICES.length?VOICES.map(v=>`<option value="${v.voiceURI}" ${best&&v.voiceURI===best.voiceURI?"selected":""}>${v.name}</option>`).join(""):`<option>No ${LANGMETA.name} voice found</option>`;
  document.querySelector("#home main").innerHTML=`
    <div class="unit-banner" style="background:var(--blue)"><div><h2>${LANGMETA.flag} ${LANGMETA.name}</h2><h1>Stats 📊</h1></div><div class="guide">Lv. ${lvl}</div></div>
    <div style="display:grid;gap:14px">
      <div class="reward" style="border-color:var(--gold);text-align:center;padding:18px"><div style="font-size:13px;color:var(--muted);font-weight:800">TOTAL XP — Level ${lvl} (${into}/100)</div><div style="font-size:34px;font-weight:800;color:var(--gold)">${S.xp}</div></div>
      <div style="display:flex;gap:14px"><div class="reward blue" style="flex:1;text-align:center"><div class="lbl">STREAK</div><div class="val">🔥 ${S.streak}</div></div><div class="reward" style="flex:1;text-align:center"><div class="lbl">GEMS</div><div class="val">💎 ${S.gems}</div></div></div>
      <div style="display:flex;gap:14px"><div class="reward" style="flex:1;border-color:var(--green);text-align:center"><div class="lbl" style="background:var(--green)">SETS DONE</div><div class="val" style="color:var(--green-dark)">${doneCount()}/${totalLessons()}</div></div><div class="reward purple" style="flex:1;text-align:center"><div class="lbl">WORDS SEEN</div><div class="val">${learning}</div></div></div>
      <div class="reward" style="border-color:var(--green);text-align:center;padding:18px"><div style="font-size:13px;color:var(--muted);font-weight:800">MASTERED (SRS 4+)</div><div style="font-size:34px;font-weight:800;color:var(--green-dark)">${strong}</div></div>
      <div class="settings-box"><label>🎯 Daily XP goal</label><select id="goalSel">${[10,20,30,50,80,120].map(g=>`<option value="${g}" ${PREFS.dailyGoal===g?"selected":""}>${g} XP / day</option>`).join("")}</select></div>
      <div class="settings-box"><label>🔔 Sound effects</label><select id="soundSel"><option value="on" ${PREFS.sound?"selected":""}>On</option><option value="off" ${!PREFS.sound?"selected":""}>Off</option></select></div>
      <div class="settings-box"><label>🔊 ${LANGMETA.name} voice</label><select id="voiceSel">${voiceOpts}</select>
        <div style="font-size:12px;color:var(--muted);font-weight:600;margin-top:10px">Best free voices are Microsoft "Online (Natural)" in <b>Microsoft Edge</b>, or Google/Siri voices. If none appear, add the language under your device's speech settings.</div>
        <button class="btn blue" id="testVoice" style="margin-top:12px">▶ Test voice</button></div>
      <button class="btn skip" id="resetBtn" style="color:var(--red)">Reset ${LANGMETA.name} progress</button>
    </div>`;
  document.getElementById("goalSel").onchange=e=>{ PREFS.dailyGoal=+e.target.value; savePrefs(); };
  document.getElementById("soundSel").onchange=e=>{ PREFS.sound=e.target.value==="on"; savePrefs(); if(PREFS.sound) sfx("correct"); };
  document.getElementById("voiceSel").onchange=e=>{ PREFS.voice[currentLang]=e.target.value; savePrefs(); };
  document.getElementById("testVoice").onclick=()=>speak(ALL_PHRASES[0]?ALL_PHRASES[0][0]:"Ciao!");
  document.getElementById("resetBtn").onclick=()=>{ if(confirm("Erase progress for "+LANGMETA.name+"?")){ S={...defState}; save(); goHome(); } };
}

/* ---------- NAV ---------- */
function setNav(v){ [...document.querySelectorAll("#nav button")].forEach(b=>b.classList.toggle("active",b.dataset.view===v)); }
function refreshBadges(){ const rb=document.querySelector('#nav button[data-view="review"]'); const old=rb.querySelector(".ndot"); if(old) old.remove(); const d=dueCount(); if(d>0){ const s=document.createElement("span"); s.className="ndot"; s.textContent=d>99?"99+":d; rb.appendChild(s); } }
document.querySelectorAll("#nav button").forEach(b=>{ b.onclick=()=>{ const v=b.dataset.view; setNav(v); if(v==="home") goHome(); else if(v==="learn") showLearn(); else if(v==="train") showTrain(); else if(v==="review") startReview(); else if(v==="stats") showStats(); }; });

/* ---------- util ---------- */
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
let _tt; function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove("show"),1800); }
if("speechSynthesis" in window){ speechSynthesis.onvoiceschanged=loadVoices; }

/* ---------- sound + confetti ---------- */
let AC=null;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function tone(f,start,dur,type,vol){ const c=ac(); if(!c) return; const o=c.createOscillator(),g=c.createGain(); o.type=type||"sine"; o.frequency.value=f; const t=c.currentTime+start; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol||.15,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+dur); o.start(t); o.stop(t+dur+.02); }
function sfx(kind){ if(!PREFS.sound) return; const c=ac(); if(!c) return; if(c.state==="suspended") c.resume();
  if(kind==="correct"){ tone(660,0,.12,"triangle",.18); tone(880,.09,.16,"triangle",.18); }
  else if(kind==="wrong"){ tone(196,0,.22,"sawtooth",.12); tone(146,.08,.26,"sawtooth",.12); }
  else if(kind==="complete"){ [523,659,784,1047].forEach((f,i)=>tone(f,i*.11,.3,"triangle",.18)); } }
function confetti(){ const cv=document.getElementById("confetti"); if(!cv) return; const dpr=window.devicePixelRatio||1; cv.style.display="block"; cv.width=innerWidth*dpr; cv.height=innerHeight*dpr; const x=cv.getContext("2d"); x.scale(dpr,dpr);
  const cols=["#58cc02","#1cb0f6","#ffc800","#ce82ff","#ff4b4b"]; const P=[]; for(let i=0;i<140;i++) P.push({x:innerWidth/2,y:innerHeight*.35,vx:(Math.random()-.5)*11,vy:Math.random()*-13-4,g:.35+Math.random()*.2,s:6+Math.random()*7,c:cols[i%cols.length],r:Math.random()*6,vr:(Math.random()-.5)*.4,a:1});
  let f=0; (function loop(){ f++; x.clearRect(0,0,innerWidth,innerHeight); let alive=false; P.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; if(f>60)p.a-=.02; if(p.a>0&&p.y<innerHeight+40){ alive=true; x.save(); x.globalAlpha=Math.max(0,p.a); x.translate(p.x,p.y); x.rotate(p.r); x.fillStyle=p.c; x.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); x.restore(); } }); if(alive&&f<160) requestAnimationFrame(loop); else cv.style.display="none"; })();
}
if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }

/* ---------- boot ---------- */
S=loadState(currentLang); buildCourse(currentLang); buildLangSel(); applyTheme(); loadVoices(); renderHome();
</script>
