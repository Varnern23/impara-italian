<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#58cc02" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Impara" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<title>Impara · Learn Italian</title>
<style>
  :root{
    --green:#58cc02; --green-dark:#58a700; --green-shadow:#4caf00;
    --blue:#1cb0f6; --blue-dark:#1899d6;
    --red:#ff4b4b; --red-dark:#ea2b2b;
    --gold:#ffc800; --purple:#ce82ff; --purple-dark:#a568cc;
    --bg:#fff; --bg2:#f7f7f7; --ink:#3c3c3c; --muted:#afafaf;
    --border:#e5e5e5; --card:#fff;
  }
  [data-theme="dark"]{ --bg:#131f24; --bg2:#1b2c34; --ink:#f1f1f1; --muted:#7b8b93; --border:#37464f; --card:#1b2c34; }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .2s,color .2s}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  select,input{font-family:inherit}
  .hidden{display:none !important}
  header{width:100%;max-width:640px;display:flex;align-items:center;gap:18px;padding:16px 20px;position:sticky;top:0;background:var(--bg);z-index:10}
  .stat{display:flex;align-items:center;gap:6px;font-weight:800;font-size:18px}
  .stat .ico{font-size:22px}
  .stat.flame{color:#ff9600} .stat.gem{color:var(--blue)} .stat.heart{color:var(--red)}
  .spacer{flex:1}
  .theme-btn{font-size:22px;opacity:.7}
  main{width:100%;max-width:640px;padding:0 20px 130px;flex:1}

  .goal-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px 16px;margin:14px 0 4px;display:flex;align-items:center;gap:14px}
  .ring{--p:0;width:54px;height:54px;border-radius:50%;background:conic-gradient(var(--green) calc(var(--p)*1%),var(--border) 0);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .ring span{width:42px;height:42px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:18px}
  .goal-card .gt{font-weight:800}
  .goal-card .gd{font-size:13px;color:var(--muted);font-weight:600}

  .unit-banner{color:#fff;border-radius:16px;padding:18px 22px;margin:14px 0 28px;display:flex;justify-content:space-between;align-items:center}
  .unit-banner h2{font-size:14px;opacity:.9;font-weight:700}
  .unit-banner h1{font-size:21px;margin-top:2px}
  .unit-banner .guide{font-size:13px;background:rgba(255,255,255,.2);padding:8px 14px;border-radius:12px;font-weight:700;white-space:nowrap}

  .path{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:18px}
  .node-wrap{display:flex;flex-direction:column;align-items:center;position:relative}
  .node{width:74px;height:66px;border-radius:50%;font-size:30px;display:flex;align-items:center;justify-content:center;transition:transform .08s;position:relative;color:#fff}
  .node:active{transform:translateY(3px)}
  .node.done{background:var(--gold);box-shadow:0 6px 0 #e0a800}
  .node.current{background:var(--green);box-shadow:0 6px 0 var(--green-shadow)}
  .node.locked{background:#c9c9c9;box-shadow:0 6px 0 #b0b0b0;cursor:not-allowed}
  .node.conj{background:var(--purple);box-shadow:0 6px 0 var(--purple-dark)}
  .node.current::after{content:"START";position:absolute;top:-34px;background:var(--card);color:var(--green);font-size:11px;font-weight:800;padding:5px 10px;border-radius:10px;border:2px solid var(--border);white-space:nowrap}
  .node-label{font-size:12px;color:var(--muted);font-weight:700;margin:4px 0 10px;max-width:150px;text-align:center}

  #lesson{width:100%;max-width:640px;padding:14px 20px;display:flex;flex-direction:column;min-height:100vh}
  .progress-row{display:flex;align-items:center;gap:14px;margin-bottom:26px}
  .close{font-size:26px;color:var(--muted);font-weight:700;line-height:1}
  .bar{flex:1;height:16px;background:var(--border);border-radius:10px;overflow:hidden}
  .bar > div{height:100%;background:var(--green);border-radius:10px;transition:width .3s;width:0}
  .mini-heart{color:var(--red);font-weight:800;font-size:18px;display:flex;align-items:center;gap:4px}
  .q-type{font-size:13px;color:var(--muted);font-weight:800;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
  .q-title{font-size:23px;font-weight:800;margin-bottom:24px}

  .audio-row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
  .speaker{display:inline-flex;align-items:center;gap:12px;background:var(--blue);color:#fff;padding:16px 22px;border-radius:16px;font-size:30px;box-shadow:0 4px 0 var(--blue-dark)}
  .speaker.slow{background:var(--muted);box-shadow:0 4px 0 #888;font-size:22px;padding:16px 18px}
  .speaker.mic{background:var(--red);box-shadow:0 4px 0 var(--red-dark);font-size:30px}
  .speaker.mic.live{animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .phrase{font-size:22px;font-weight:700;margin:14px 0 26px;line-height:1.4}
  .ctx{font-size:15px;color:var(--muted);font-weight:600;margin:-10px 0 20px}
  .heard{font-size:15px;font-weight:700;margin:16px 0;padding:12px;border-radius:12px;background:var(--bg2)}

  .choices{display:grid;gap:12px}
  .choice{border:2px solid var(--border);border-bottom-width:4px;border-radius:14px;padding:16px 18px;font-size:18px;font-weight:600;text-align:left;background:var(--card);transition:transform .05s}
  .choice:active{transform:translateY(2px)}
  .choice.sel{border-color:var(--blue);background:#ddf4ff;color:var(--blue-dark)}
  .choice.right{border-color:var(--green);background:#d7ffb8;color:var(--green-dark)}
  .choice.wrong{border-color:var(--red);background:#ffdfe0;color:var(--red-dark)}
  .choice .num{display:inline-block;width:26px;height:26px;border:2px solid var(--border);border-radius:8px;text-align:center;line-height:23px;font-size:13px;margin-right:12px;color:var(--muted)}

  .answer-area{min-height:64px;border-bottom:2px solid var(--border);display:flex;flex-wrap:wrap;gap:8px;padding:10px 0;margin-bottom:22px;align-content:flex-start}
  .bank{display:flex;flex-wrap:wrap;gap:10px}
  .tile{border:2px solid var(--border);border-bottom-width:4px;border-radius:12px;padding:10px 16px;font-size:17px;font-weight:600;background:var(--card)}
  .tile:active{transform:translateY(2px)} .tile.used{visibility:hidden}
  .match-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .match-grid button{border:2px solid var(--border);border-bottom-width:4px;border-radius:12px;padding:16px;font-size:17px;font-weight:600;background:var(--card)}
  .match-grid button.sel{border-color:var(--blue);background:#ddf4ff;color:var(--blue-dark)}
  .match-grid button.gone{opacity:.25;pointer-events:none;border-color:var(--green)}
  .wrong-flash{border-color:var(--red)!important;background:#ffdfe0!important}
  input.type{width:100%;border:2px solid var(--border);border-radius:14px;padding:14px;font-size:18px;outline:none;background:var(--card);color:var(--ink)}
  input.type:focus{border-color:var(--blue)}
  .conj-pronoun{font-size:34px;font-weight:800;margin:6px 0 2px;color:var(--purple)}
  .gender-noun{font-size:34px;font-weight:800;margin:6px 0 18px}

  .foot{margin-top:auto;border-top:2px solid var(--border);padding:18px 0 4px}
  .foot.show-result{margin:0 -20px;padding:18px 20px 22px}
  .foot.correct{background:#d7ffb8} .foot.incorrect{background:#ffdfe0}
  .result-msg{display:flex;align-items:center;gap:12px;font-size:20px;font-weight:800;margin-bottom:14px}
  .result-msg.correct{color:var(--green-dark)} .result-msg.incorrect{color:var(--red-dark)}
  .result-msg .sub{display:block;font-size:14px;font-weight:600;margin-top:2px}
  .btn{width:100%;padding:15px;border-radius:16px;font-size:16px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#fff;background:var(--green);box-shadow:0 4px 0 var(--green-shadow)}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green-shadow)}
  .btn:disabled{background:var(--border);color:var(--muted);box-shadow:0 4px 0 #cfcfcf;cursor:not-allowed}
  .btn.skip{background:var(--card);color:var(--muted);box-shadow:0 4px 0 var(--border);border:2px solid var(--border)}
  .btn.red{background:var(--red);box-shadow:0 4px 0 var(--red-dark)}
  .btn.blue{background:var(--blue);box-shadow:0 4px 0 var(--blue-dark)}
  .btn.purple{background:var(--purple);box-shadow:0 4px 0 var(--purple-dark)}

  .center-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:100vh;padding:30px;gap:22px}
  .center-screen h1{font-size:30px;color:var(--gold)}
  .center-screen p{color:var(--muted);font-weight:600;max-width:360px;line-height:1.5}
  .big{font-size:72px}
  .reward-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .reward{border:2px solid var(--gold);border-radius:14px;padding:10px 16px;min-width:120px}
  .reward.blue{border-color:var(--blue)} .reward.purple{border-color:var(--purple)}
  .reward .lbl{font-size:11px;font-weight:800;color:#fff;background:var(--gold);border-radius:8px;padding:3px;letter-spacing:.5px}
  .reward.blue .lbl{background:var(--blue)} .reward.purple .lbl{background:var(--purple)}
  .reward .val{font-size:24px;font-weight:800;margin-top:8px;color:var(--gold)}
  .reward.blue .val{color:var(--blue)} .reward.purple .val{color:var(--purple)}

  .menu-card{background:var(--card);border:2px solid var(--border);border-bottom-width:4px;border-radius:16px;padding:18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;width:100%;text-align:left}
  .menu-card:active{transform:translateY(2px)}
  .menu-card .mi{font-size:34px} .menu-card .mt{font-size:18px;font-weight:800}
  .menu-card .md{font-size:13px;color:var(--muted);font-weight:600;margin-top:2px}
  .menu-card .badge{margin-left:auto;background:var(--red);color:#fff;font-weight:800;border-radius:20px;padding:4px 12px;font-size:14px}

  .back-btn{font-weight:800;color:var(--muted);margin:8px 0 16px;font-size:15px}
  .search{width:100%;border:2px solid var(--border);border-radius:14px;padding:12px 16px;font-size:16px;background:var(--card);color:var(--ink);margin-bottom:14px;outline:none}
  .search:focus{border-color:var(--blue)}
  .dict-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .dict-row .it{font-weight:800;font-size:17px} .dict-row .en{color:var(--muted);font-weight:600;font-size:14px}
  .dict-row .pl{margin-left:auto;font-size:22px;opacity:.6}

  .acc{background:var(--card);border:2px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
  .acc h3{padding:16px;font-size:16px;font-weight:800;display:flex;justify-content:space-between;align-items:center}
  .acc .body{padding:0 16px 16px;font-size:15px;line-height:1.6;color:var(--ink)}
  .acc .body b{color:var(--green-dark)}
  .acc .body table{width:100%;border-collapse:collapse;margin:8px 0;font-size:14px}
  .acc .body td{border:1px solid var(--border);padding:6px 8px}
  .acc .body code{background:var(--bg2);padding:2px 6px;border-radius:6px;font-weight:700}

  .conj-table{width:100%;border-collapse:collapse;font-size:14px;margin-top:8px}
  .conj-table th{background:var(--bg2);padding:8px;font-size:12px;text-transform:uppercase;color:var(--muted)}
  .conj-table td{border:1px solid var(--border);padding:10px 8px;text-align:center;font-weight:700}
  .conj-table td:first-child{background:var(--bg2);font-weight:800;color:var(--purple)}
  .conj-table td.tap:active{background:#ddf4ff}

  .story-line{padding:14px 0;border-bottom:1px solid var(--border)}
  .story-line .it{font-size:18px;line-height:1.7;font-weight:600}
  .story-line .it span{padding:1px 2px;border-radius:4px;cursor:pointer}
  .story-line .it span:active{background:#ddf4ff}
  .story-line .en{color:var(--muted);font-size:14px;font-weight:600;margin-top:6px;display:none}
  .story-line.open .en{display:block}
  .story-line .tr{font-size:12px;font-weight:800;color:var(--blue);margin-top:4px}

  nav{position:fixed;bottom:0;width:100%;max-width:640px;display:flex;justify-content:space-around;background:var(--card);border-top:2px solid var(--border);padding:8px 0}
  nav button{font-size:23px;padding:8px 10px;border-radius:12px;opacity:.5;position:relative}
  nav button.active{opacity:1;background:#ddf4ff}
  [data-theme="dark"] nav button.active{background:var(--bg2)}
  nav .ndot{position:absolute;top:2px;right:2px;background:var(--red);color:#fff;font-size:11px;font-weight:800;border-radius:10px;padding:0 5px}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:12px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:50;max-width:90%}
  .toast.show{opacity:1}
  .tip{background:#ddf4ff;border-radius:12px;padding:14px 16px;font-size:14px;color:var(--blue-dark);margin-bottom:20px;font-weight:600}
  [data-theme="dark"] .tip{background:var(--bg2);color:var(--blue)}
  .settings-box{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
  .settings-box label{font-size:13px;font-weight:800;color:var(--muted);display:block;margin-bottom:8px}
  .settings-box select,.settings-box input{width:100%;padding:12px;border-radius:10px;border:2px solid var(--border);background:var(--bg);color:var(--ink);font-size:15px}

  /* animations */
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.06)}100%{transform:scale(1)}}
  @keyframes popIn{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  #qbody{animation:fadeUp .25s ease}
  .center-screen .big{animation:popIn .5s cubic-bezier(.2,1.3,.5,1)}
  .center-screen h1{animation:fadeUp .4s .1s ease both}
  .center-screen .reward-row{animation:fadeUp .4s .2s ease both}
  .choice.right{animation:pop .35s ease}
  .foot.incorrect{animation:shake .4s ease}
  .menu-card{animation:fadeUp .25s ease both}
  .menu-card:nth-child(2){animation-delay:.03s}.menu-card:nth-child(3){animation-delay:.06s}
  .menu-card:nth-child(4){animation-delay:.09s}.menu-card:nth-child(5){animation-delay:.12s}
  .menu-card:nth-child(6){animation-delay:.15s}.menu-card:nth-child(7){animation-delay:.18s}
  .menu-card:nth-child(8){animation-delay:.21s}.menu-card:nth-child(9){animation-delay:.24s}
  #confetti{position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:60;display:none}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div id="home">
  <header>
    <div class="stat flame"><span class="ico">🔥</span><span id="streak">0</span></div>
    <div class="stat gem"><span class="ico">💎</span><span id="gems">0</span></div>
    <div class="spacer"></div>
    <button class="theme-btn" id="themeBtn">🌙</button>
    <div class="stat heart"><span class="ico">❤️</span><span id="hearts">5</span></div>
  </header>
  <main><div id="path"></div></main>
</div>
<div id="lesson" class="hidden"></div>
<nav id="nav">
  <button data-view="home" class="active">🏠</button>
  <button data-view="learn">📚</button>
  <button data-view="train">🏋️</button>
  <button data-view="review">🔁</button>
  <button data-view="stats">📊</button>
</nav>
<div class="toast" id="toast"></div>
<canvas id="confetti"></canvas>

<script>
/* ============================================================
   IMPARA v4 — Italian trainer (single file, no backend)
   24 units · 5-tense conjugation · spaced repetition ·
   speaking (speech recognition) · reading stories ·
   dictionary · grammar reference · conjugation tables ·
   dictation · gender drill · hardest-words · numbers ·
   slow audio · daily goals · dark mode · smart voices.
   ============================================================ */

/* ---------- VOCAB UNITS ---------- */
const CURRICULUM = [
 { unit:"Unit 1", title:"Greetings", guide:"Buongiorno!", color:"var(--green)", lessons:[
   { name:"Ciao!", cards:[["ciao","hi / bye"],["buongiorno","good morning"],["buonasera","good evening"],["buonanotte","good night"],["grazie","thank you"],["prego","you're welcome"],["sì","yes"],["no","no"]],
     sentences:[["Buongiorno!","Good morning!"],["Grazie mille","Thanks a lot"]] },
   { name:"Io sono", cards:[["io","I"],["sono","I am"],["tu","you"],["sei","you are"],["mi chiamo","my name is"],["come stai?","how are you?"],["bene","well / fine"],["e tu?","and you?"]],
     sentences:[["Io sono Marco","I am Marco"],["Come stai?","How are you?"]] },
 ]},
 { unit:"Unit 2", title:"Family & People", guide:"La famiglia", color:"var(--blue)", lessons:[
   { name:"Family", cards:[["la madre","the mother"],["il padre","the father"],["il fratello","the brother"],["la sorella","the sister"],["il figlio","the son"],["la figlia","the daughter"],["i genitori","the parents"],["il nonno","the grandfather"]],
     sentences:[["Lei è mia sorella","She is my sister"],["Ho un fratello","I have a brother"]] },
   { name:"Describing", cards:[["alto","tall"],["basso","short"],["bello","beautiful"],["piccolo","small"],["grande","big"],["giovane","young"],["vecchio","old"],["simpatico","nice / likeable"]],
     sentences:[["Mio padre è alto","My father is tall"],["La casa è grande","The house is big"]] },
 ]},
 { unit:"Unit 3", title:"Food & Drink", guide:"Buon appetito!", color:"#ff9600", lessons:[
   { name:"At the table", cards:[["il pane","the bread"],["l'acqua","the water"],["il vino","the wine"],["la pasta","the pasta"],["il formaggio","the cheese"],["il caffè","the coffee"],["la mela","the apple"],["la carne","the meat"]],
     sentences:[["Vorrei un caffè","I'd like a coffee"],["L'acqua è fredda","The water is cold"]] },
   { name:"Ordering", cards:[["vorrei","I would like"],["mangiare","to eat"],["bere","to drink"],["il conto","the bill"],["per favore","please"],["delizioso","delicious"],["il cameriere","the waiter"],["il menù","the menu"]],
     sentences:[["Il conto, per favore","The bill, please"],["Vorrei mangiare la pasta","I'd like to eat pasta"]] },
 ]},
 { unit:"Unit 4", title:"Getting Around", guide:"Andiamo!", color:"var(--purple)", lessons:[
   { name:"Places", cards:[["la città","the city"],["la stazione","the station"],["l'albergo","the hotel"],["il ristorante","the restaurant"],["la strada","the street"],["a sinistra","to the left"],["a destra","to the right"],["dritto","straight ahead"]],
     sentences:[["Dov'è la stazione?","Where is the station?"],["Giri a destra","Turn right"]] },
   { name:"Travel", cards:[["il treno","the train"],["l'autobus","the bus"],["la macchina","the car"],["l'aereo","the plane"],["arrivare","to arrive"],["il biglietto","the ticket"],["l'aeroporto","the airport"],["la valigia","the suitcase"]],
     sentences:[["Prendo il treno","I take the train"],["Un biglietto, per favore","One ticket, please"]] },
 ]},
 { unit:"Unit 5", title:"Time & Routine", guide:"Che ora è?", color:"var(--green)", lessons:[
   { name:"Days & time", cards:[["oggi","today"],["domani","tomorrow"],["ieri","yesterday"],["la mattina","the morning"],["la sera","the evening"],["adesso","now"],["sempre","always"],["la settimana","the week"]],
     sentences:[["Che ora è?","What time is it?"],["Ci vediamo domani","See you tomorrow"]] },
   { name:"Daily verbs", cards:[["svegliarsi","to wake up"],["lavorare","to work"],["dormire","to sleep"],["studiare","to study"],["leggere","to read"],["fare","to do / make"],["uscire","to go out"],["tornare","to return"]],
     sentences:[["Lavoro ogni giorno","I work every day"],["Studio l'italiano","I study Italian"]] },
 ]},
 { unit:"Unit 6", title:"Feelings & Talk", guide:"Come va?", color:"var(--blue)", lessons:[
   { name:"Emotions", cards:[["felice","happy"],["triste","sad"],["stanco","tired"],["arrabbiato","angry"],["contento","glad"],["preoccupato","worried"],["spaventato","scared"],["annoiato","bored"]],
     sentences:[["Sono molto felice","I'm very happy"],["Sei stanco?","Are you tired?"]] },
   { name:"Conversation", cards:[["capisco","I understand"],["non capisco","I don't understand"],["puoi ripetere?","can you repeat?"],["parli inglese?","do you speak English?"],["lentamente","slowly"],["certo","of course"],["forse","maybe"],["va bene","okay / fine"]],
     sentences:[["Non capisco, puoi ripetere?","I don't understand, can you repeat?"],["Parli più lentamente","Speak more slowly"]] },

function vstem(inf){ return inf.slice(0,-3); }
function futBase(v){ let b=v.inf.slice(0,-1); if(v.g==="are") b=b.slice(0,-2)+"er"; return b; }
function conjugate(v,tense){
  if(v.irr&&v.irr[tense]) return v.irr[tense];
  if(tense==="present") return REG_PRES[v.g].map(x=>vstem(v.inf)+x);
  if(tense==="imperfetto") return REG_IMP[v.g==="isc"?"ire":v.g].map(x=>vstem(v.inf)+x);
  if(tense==="futuro") return FUT_END.map(x=>futBase(v)+x);
  if(tense==="condizionale") return COND_END.map(x=>futBase(v)+x);
  if(tense==="passato"){ if(v.aux==="essere"){ const b=v.part.slice(0,-1),agr=["o","o","o","i","i","i"]; return AUX.essere.map((a,i)=>a+" "+b+agr[i]); } return AUX.avere.map(a=>a+" "+v.part); }
  return [];
}

/* ---------- NUMBERS ---------- */
function itNum(n){
  const u=["zero","uno","due","tre","quattro","cinque","sei","sette","otto","nove"];
  const teens=["dieci","undici","dodici","tredici","quattordici","quindici","sedici","diciassette","diciotto","diciannove"];
  const tens=["","","venti","trenta","quaranta","cinquanta","sessanta","settanta","ottanta","novanta"];
  if(n>=100) return "cento";
  if(n<10) return u[n];
  if(n<20) return teens[n-10];
  const t=Math.floor(n/10),o=n%10; let base=tens[t];
  if(o===0) return base;
  if(o===1||o===8) base=base.slice(0,-1);
  let ones=u[o]; if(o===3) ones="tré";
  return base+ones;
}

const GRAMMAR=[
 {t:"Nouns & gender",b:"Every Italian noun is <b>masculine</b> or <b>feminine</b>. Rule of thumb: nouns ending in <code>-o</code> are usually masculine (<code>il libro</code>), nouns ending in <code>-a</code> are usually feminine (<code>la casa</code>). Nouns ending in <code>-e</code> can be either — you just learn them (<code>il fiore</code> m, <code>la chiave</code> f)."},
 {t:"Definite articles (the)",b:"Italian has several words for <b>the</b>:<br>• <code>il</code> — masc. before most consonants (il cane)<br>• <code>lo</code> — masc. before s+consonant, z, gn, ps (lo studente, lo zaino)<br>• <code>l'</code> — before a vowel (l'amico, l'acqua)<br>• <code>la</code> — feminine (la casa)<br>Plurals: <code>i</code>, <code>gli</code>, <code>le</code>."},
 {t:"Indefinite articles (a/an)",b:"• <code>un</code> — masc. (un cane)<br>• <code>uno</code> — masc. before s+cons, z (uno studente)<br>• <code>una</code> — fem. (una casa)<br>• <code>un'</code> — fem. before a vowel (un'amica)."},
 {t:"Plurals",b:"Change the final vowel:<br>• <code>-o → -i</code> (libro → libri)<br>• <code>-a → -e</code> (casa → case)<br>• <code>-e → -i</code> (cane → cani, both genders)<br>Articles change too: il→i, lo/l'→gli, la/l'→le."},
 {t:"Adjective agreement",b:"Adjectives <b>match</b> the noun in gender and number: <code>il ragazzo alt<b>o</b></code>, <code>la ragazza alt<b>a</b></code>, <code>i ragazzi alt<b>i</b></code>, <code>le ragazze alt<b>e</b></code>. Adjectives in <code>-e</code> (grande, importante) only change for number: grande → grandi."},
 {t:"Present tense",b:"Drop the ending and add new endings.<br><b>-are</b> (parlare): o, i, a, iamo, ate, ano<br><b>-ere</b> (credere): o, i, e, iamo, ete, ono<br><b>-ire</b> (dormire): o, i, e, iamo, ite, ono<br>Many -ire verbs add -isc- (capire → capisco). Use the Conjugation tables tab to see full grids."},
 {t:"Essere vs avere (to be / to have)",b:"Two essential irregular verbs.<br><b>essere</b>: sono, sei, è, siamo, siete, sono<br><b>avere</b>: ho, hai, ha, abbiamo, avete, hanno<br>Note <code>ho/hai/ha/hanno</code> have a silent H. Use <code>avere</code> for age and hunger: <code>ho fame</code> (I'm hungry), <code>ho 20 anni</code> (I'm 20)."},
 {t:"Passato prossimo (past)",b:"The everyday past = <b>avere/essere (present) + past participle</b>.<br>Participles: -are→-ato, -ere→-uto, -ire→-ito.<br><code>Ho mangiat<b>o</b></code> (I ate). Verbs of movement/change use <b>essere</b>, and the participle agrees: <code>sono andat<b>o</b></code> (m) / <code>andat<b>a</b></code> (f)."},
 {t:"Imperfetto (used to / was -ing)",b:"For habits, descriptions and background in the past. Very regular: stem + <br>-are: avo, avi, ava, avamo, avate, avano<br>-ere/-ire: evo/ivo …<br><code>Da bambino <b>andavo</b> al mare</code> (As a child I used to go to the sea). Key irregular: <b>ero</b> (I was)."},
 {t:"Future & conditional",b:"Same stem, different endings.<br><b>Future</b>: parler<b>ò</b>, parler<b>ai</b>, parler<b>à</b>… (I will speak)<br><b>Conditional</b>: parler<b>ei</b>, parler<b>esti</b>, parler<b>ebbe</b>… (I would speak)<br>Super useful polite forms: <code>vorrei</code> (I'd like), <code>potrei</code> (I could), <code>dovrei</code> (I should)."},
 {t:"Negation",b:"Just put <code>non</code> before the verb: <code>Non capisco</code> (I don't understand). Double negatives are normal: <code>Non ho <b>niente</b></code> (I have nothing), <code>Non c'è <b>nessuno</b></code> (there's no one)."},
 {t:"Asking questions",b:"Word order stays the same — intonation (or a <code>?</code>) makes it a question: <code>Parli italiano?</code> Question words: <code>chi</code> (who), <code>cosa/che</code> (what), <code>dove</code> (where), <code>quando</code> (when), <code>perché</code> (why), <code>come</code> (how), <code>quanto</code> (how much)."},
 {t:"Prepositions + articles",b:"Prepositions merge with the article:<br><code>a + il = al</code>, <code>di + il = del</code>, <code>in + la = nella</code>, <code>su + il = sul</code>.<br>Example: <code>Vado <b>al</b> mare</code> (a+il), <code>il libro è <b>sul</b> tavolo</code> (su+il)."},
 {t:"Mi piace (I like)",b:"Literally 'it is pleasing to me'. Use <b>piace</b> + singular: <code>Mi piace il caffè</code>. Use <b>piacciono</b> + plural: <code>Mi piacciono i gatti</code>. Change the pronoun for who likes it: ti piace (you), gli piace (he)."},
];

/* ---------- STATE ---------- */
const SAVE_KEY="impara_save_v3";
const defaultState={ xp:0,gems:0,hearts:5,streak:0,lastDay:null,completed:{},srs:{},theme:"light",lastHeart:Date.now(),voiceURI:"",dailyGoal:30,todayKey:null,todayXp:0,sound:true };
let S=load();
function load(){ try{ const r=JSON.parse(localStorage.getItem(SAVE_KEY)); if(r) return {...defaultState,...r};
  const old=JSON.parse(localStorage.getItem("impara_save_v2")); return old?{...defaultState,...old}:{...defaultState}; }catch(e){ return {...defaultState}; } }
function save(){ localStorage.setItem(SAVE_KEY,JSON.stringify(S)); }
function regenHearts(){ if(S.hearts>=5){ S.lastHeart=Date.now(); return; } const g=Math.floor((Date.now()-(S.lastHeart||Date.now()))/120e4); if(g>0){ S.hearts=Math.min(5,S.hearts+g); S.lastHeart=Date.now(); save(); } }
function lessonId(u,l){ return u+"-"+l; }
function isDone(u,l){ return !!S.completed[lessonId(u,l)]; }
function totalLessons(){ return CURRICULUM.reduce((a,u)=>a+u.lessons.length,0); }
function doneCount(){ return Object.keys(S.completed).length; }
function isUnlocked(u,l){ if(u===0&&l===0) return true; if(l>0) return isDone(u,l-1); const p=CURRICULUM[u-1]; return isDone(u-1,p.lessons.length-1); }
const SRS_GAPS=[0,4*36e5,24*36e5,3*24*36e5,7*24*36e5,21*24*36e5,60*24*36e5];
function srsTouch(it,en,correct){ const e=S.srs[it]||{s:0,due:0,en}; e.en=en; e.s=correct?Math.min(6,e.s+1):Math.max(0,e.s-1); e.due=Date.now()+SRS_GAPS[e.s]; S.srs[it]=e; }
function dueCount(){ const n=Date.now(); return Object.values(S.srs).filter(e=>e.due<=n).length; }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+d.getMonth()+"-"+d.getDate(); }
function bumpStreak(){ const t=todayStr(); if(S.lastDay===t) return; const yd=new Date(Date.now()-864e5); const y=yd.getFullYear()+"-"+yd.getMonth()+"-"+yd.getDate(); S.streak=(S.lastDay===y)?S.streak+1:1; S.lastDay=t; }
function addTodayXp(n){ const t=todayStr(); if(S.todayKey!==t){ S.todayKey=t; S.todayXp=0; } S.todayXp+=n; }
function todayXp(){ return S.todayKey===todayStr()?S.todayXp:0; }

/* ---------- THEME / VOICE ---------- */
function applyTheme(){ document.documentElement.dataset.theme=S.theme; document.getElementById("themeBtn").textContent=S.theme==="dark"?"☀️":"🌙"; }
document.getElementById("themeBtn").onclick=()=>{ S.theme=S.theme==="dark"?"light":"dark"; save(); applyTheme(); };
let VOICES=[];
function loadVoices(){ VOICES=(window.speechSynthesis?speechSynthesis.getVoices():[]).filter(v=>v.lang&&v.lang.toLowerCase().startsWith("it")); }
function scoreVoice(v){ const n=(v.name+" "+v.voiceURI).toLowerCase(); let s=0; if(n.includes("natural")||n.includes("online")) s+=100; if(/(isabella|elsa|diego|giuseppe|fabiola|imelda|palmira)/.test(n)) s+=40; if(n.includes("google")) s+=30; if(n.includes("alice")) s+=10; return s; }
function pickVoice(){ loadVoices(); if(!VOICES.length) return null; if(S.voiceURI){ const m=VOICES.find(v=>v.voiceURI===S.voiceURI); if(m) return m; } return [...VOICES].sort((a,b)=>scoreVoice(b)-scoreVoice(a))[0]; }
function speak(text,rate){ if(!text||!window.speechSynthesis) return; try{ const u=new SpeechSynthesisUtterance(text); u.lang="it-IT"; u.rate=rate||.9; const v=pickVoice(); if(v) u.voice=v; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){} }
function speakSlow(text){ speak(text,.55); }

  CURRICULUM.forEach((unit,ui)=>{
    const b=document.createElement("div"); b.className="unit-banner"; b.style.background=unit.color;

    });

  cb.innerHTML=`<div><h2>Grammar Gym</h2><h1>Verb Conjugation 🏛️</h1></div><div class="guide">5 tenses</div>`; path.appendChild(cb);
  const cw=document.createElement("div"); cw.className="path"; const cn=document.createElement("div"); cn.className="node-wrap";
  cn.innerHTML=`<button class="node conj">🔤</button><div class="node-label">Conjugation drill</div>`;
  cn.querySelector("button").onclick=startConjugation; cw.appendChild(cn); path.appendChild(cw);
  refreshBadges();
}

/* ---------- QUESTION BUILDERS ---------- */
function buildQueue(unit,lesson){
  const les=CURRICULUM[unit].lessons[lesson]; const all=CURRICULUM.flatMap(u=>u.lessons.flatMap(l=>l.cards)); const q=[];
  les.cards.forEach(c=>q.push(makeMC(c,all,"it2en")));
  les.cards.filter((_,i)=>i%2===0).forEach(c=>q.push(makeMC(c,all,"en2it")));
  les.cards.filter((_,i)=>i%2===1).forEach(c=>q.push(makeListen(c,all)));
  les.sentences.forEach(s=>q.push(makeBank(s)));
  les.sentences.forEach(s=>q.push(makeType(s)));
  q.push(makeMatch(les.cards.slice(0,5)));
  return shuffle(q);
}
function sample(arr,n,ex){ return shuffle(arr.filter(x=>x[0]!==ex)).slice(0,n); }
function makeMC(card,all,dir){ const [it,en]=card;
  if(dir==="it2en"){ const opts=shuffle([en,...sample(all,3,it).map(c=>c[1])]); return {type:"mc",qtype:"Select the meaning",prompt:it,speak:it,options:opts,answer:en,label:"What does this mean?",term:it,termEn:en}; }
  const opts=shuffle([it,...sample(all,3,it).map(c=>c[0])]); return {type:"mc",qtype:"Select the translation",prompt:en,speak:null,options:opts,answer:it,label:"How do you say this?",term:it,termEn:en}; }
function makeListen(card,all){ const [it,en]=card; const opts=shuffle([en,...sample(all,3,it).map(c=>c[1])]); return {type:"mc",qtype:"Listening",prompt:"🔊 Tap to listen",speak:it,options:opts,answer:en,label:"What did you hear?",listen:true,term:it,termEn:en}; }
function makeBank(sent){ const [it,en]=sent; const words=it.split(" "); const extra=["è","la","molto","con","non","un"].filter(w=>!words.includes(w)).slice(0,2); return {type:"bank",qtype:"Build the sentence",prompt:en,speak:it,tiles:shuffle([...words,...extra]),answer:words,label:"Translate this sentence",term:it,termEn:en}; }
function makeType(sent){ const [it,en]=sent; return {type:"type",qtype:"Write in Italian",prompt:en,speak:it,answer:it,label:"Write this in Italian",term:it,termEn:en}; }
function makeMatch(cards){ return {type:"match",qtype:"Match the pairs",pairs:cards.map(c=>({it:c[0],en:c[1]})),label:"Tap the matching pairs"}; }
function makeDictation(sent){ const [it,en]=sent; return {type:"type",qtype:"Dictation",prompt:null,dictation:true,hint:en,speak:it,answer:it,label:"Listen and type what you hear",term:it,termEn:en}; }
function makeSpeak(card){ const [it,en]=card; return {type:"speak",qtype:"Speaking",prompt:it,en,speak:it,answer:it,label:"Say this out loud",term:it,termEn:en}; }
function makeNumber(){ const n=Math.floor(Math.random()*101); return {type:"type",qtype:"Numbers",prompt:null,dictation:true,hint:"type the number you hear (digits)",speak:itNum(n),answer:String(n),term:"num·"+n,termEn:String(n)}; }
function makeConj(){ const v=VERBS[Math.floor(Math.random()*VERBS.length)],t=TENSES[Math.floor(Math.random()*TENSES.length)],idx=Math.floor(Math.random()*6);
  const forms=conjugate(v,t.key),answer=forms[idx]; const wrong=new Set(); forms.forEach((f,i)=>{ if(i!==idx) wrong.add(f); });
  while(wrong.size<3){ const ov=VERBS[Math.floor(Math.random()*VERBS.length)]; const f=conjugate(ov,t.key)[Math.floor(Math.random()*6)]; if(f!==answer) wrong.add(f); }
  return {type:"mc",qtype:"Conjugation · "+t.name,conj:{pronoun:PRONOUNS[idx],inf:v.inf,en:v.en,tense:t.name},options:shuffle([answer,...[...wrong].slice(0,3)]),answer,label:"Choose the correct form",speak:answer.includes(" ")?answer:PRONOUNS[idx].split("/")[0]+" "+answer,term:v.inf+"·"+t.key+"·"+idx,termEn:v.en}; }
function genderItems(){ const out=[]; CURRICULUM.forEach(u=>u.lessons.forEach(l=>l.cards.forEach(c=>{ const m=c[0].match(/^(il|lo|la)\s+(.+)/); if(m) out.push({art:m[1],noun:m[2],en:c[1],full:c[0]}); }))); return out; }
function makeGender(item){ return {type:"mc",qtype:"Articles · il / lo / la",gender:{noun:item.noun,en:item.en},options:shuffle(["il","lo","la"]),answer:item.art,label:"Which article?",speak:item.full,term:item.full,termEn:item.en}; }

/* ---------- SESSION ---------- */
let L=null;
const HEART_MODES=["lesson","conj","dictation","gender"];
function noHearts(){ return S.hearts<=0; }
function startLesson(u,l){ regenHearts(); if(noHearts()){ toast("No hearts! Review to keep going ❤️"); return; } L={unit:u,lesson:l,queue:buildQueue(u,l),i:0,correct:0,mistakes:0,wrongQ:[],mode:"lesson"}; show("lesson"); renderQuestion(); }
function startConjugation(){ regenHearts(); if(noHearts()){ toast("No hearts! Review to keep going ❤️"); return; } const q=[]; for(let k=0;k<15;k++) q.push(makeConj()); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"conj"}; show("lesson"); renderQuestion(); }
function startPractice(){ regenHearts(); const done=Object.keys(S.completed); const pool=done.length?done.map(k=>k.split("-").map(Number)):[[0,0]]; let q=[]; pool.forEach(([u,l])=>q.push(...buildQueue(u,l))); q=shuffle(q).slice(0,12); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"practice"}; show("lesson"); renderQuestion(); }
function startReview(){ const n=Date.now(); let due=Object.entries(S.srs).filter(([it,e])=>e.due<=n&&!it.startsWith("num·")).map(([it,e])=>[it,e.en]); if(!due.length){ toast("Nothing due! Come back later 🔁"); return; } due=shuffle(due).slice(0,15); const all=CURRICULUM.flatMap(u=>u.lessons.flatMap(l=>l.cards)); const q=due.map(c=>Math.random()<.5?makeMC(c,all,"it2en"):makeMC(c,all,"en2it")); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"review"}; show("lesson"); renderQuestion(); }
function startDictation(){ regenHearts(); if(noHearts()){ toast("No hearts! Review to keep going ❤️"); return; } const s=CURRICULUM.flatMap(u=>u.lessons.flatMap(l=>l.sentences)); const q=shuffle(s).slice(0,10).map(makeDictation); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"dictation"}; show("lesson"); renderQuestion(); }
function startGender(){ regenHearts(); if(noHearts()){ toast("No hearts! Review to keep going ❤️"); return; } const q=shuffle(genderItems()).slice(0,15).map(makeGender); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"gender"}; show("lesson"); renderQuestion(); }
function startHardest(){ const e=Object.entries(S.srs).filter(([it])=>!it.startsWith("num·")); if(e.length<4){ toast("Learn a few lessons first 🧠"); return; } const sorted=e.sort((a,b)=>(a[1].s-b[1].s)||(a[1].due-b[1].due)).slice(0,15).map(([it,x])=>[it,x.en]); const all=CURRICULUM.flatMap(u=>u.lessons.flatMap(l=>l.cards)); const q=sorted.map(c=>Math.random()<.5?makeMC(c,all,"en2it"):makeMC(c,all,"it2en")); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"hardest"}; show("lesson"); renderQuestion(); }
function startSpeaking(){ const SR=window.SpeechRecognition||window.webkitSpeechRecognition; const cards=CURRICULUM.flatMap(u=>u.lessons.flatMap(l=>[...l.cards,...l.sentences])); const q=shuffle(cards).slice(0,10).map(makeSpeak); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"speaking",srOK:!!SR}; show("lesson"); renderQuestion(); }
function startNumbers(){ regenHearts(); const q=[]; for(let k=0;k<12;k++) q.push(makeNumber()); L={queue:q,i:0,correct:0,mistakes:0,wrongQ:[],mode:"numbers"}; show("lesson"); renderQuestion(); }

function show(view){ document.getElementById("home").classList.toggle("hidden",view!=="home"); document.getElementById("lesson").classList.toggle("hidden",view!=="lesson"); document.getElementById("nav").classList.toggle("hidden",view==="lesson"); }

function renderQuestion(){
  const el=document.getElementById("lesson"),q=L.queue[L.i],pct=Math.round((L.i/L.queue.length)*100);
  const heart=HEART_MODES.includes(L.mode)?`<div class="mini-heart">❤️ ${S.hearts}</div>`:`<div class="mini-heart" style="color:var(--muted)">${L.i+1}/${L.queue.length}</div>`;
  el.innerHTML=`<div class="progress-row"><button class="close" id="closeBtn">✕</button><div class="bar"><div style="width:${pct}%"></div></div>${heart}</div>
    <div class="q-type">${q.qtype}</div><div class="q-title">${q.label}</div><div id="qbody"></div>
    <div class="foot" id="foot"><button class="btn" id="checkBtn" disabled>Check</button></div>`;
  document.getElementById("closeBtn").onclick=()=>{ if(confirm("Quit? This session's progress is lost.")) goHome(); };
  const body=document.getElementById("qbody");
  if(q.type==="mc") renderMC(q,body);
  else if(q.type==="bank") renderBank(q,body);
  else if(q.type==="type") renderType(q,body);
  else if(q.type==="match") renderMatch(q,body);
  else if(q.type==="speak") renderSpeak(q,body);
}
function audioControls(q,withSlow){ return `<div class="audio-row"><button class="speaker" id="spk">🔊</button>${withSlow?`<button class="speaker slow" id="slow">🐢</button>`:""}</div>`; }
function wireAudio(q){ const s=document.getElementById("spk"); if(s) s.onclick=()=>speak(q.speak); const sl=document.getElementById("slow"); if(sl) sl.onclick=()=>speakSlow(q.speak); }

function renderMC(q,body){
  let sel=null,head="";
  if(q.conj) head=`<div class="ctx">${q.conj.inf} — ${q.conj.en} · <b>${q.conj.tense}</b></div><div class="conj-pronoun">${q.conj.pronoun} ___</div>`;
  else if(q.gender) head=`<div class="ctx">${q.gender.en}</div><div class="gender-noun">___ ${q.gender.noun}</div>`;
  else head=(q.speak?audioControls(q,q.listen):"")+(q.listen?"":`<div class="phrase">${q.prompt}</div>`);
  body.innerHTML=`${head}<div class="choices"></div>`;
  if(q.speak&&!q.conj&&!q.gender){ wireAudio(q); if(q.listen) speak(q.speak); }
  const wrap=body.querySelector(".choices");
  q.options.forEach((opt,i)=>{ const b=document.createElement("button"); b.className="choice"; b.innerHTML=`<span class="num">${i+1}</span>${opt}`; b.onclick=()=>{ sel=opt; [...wrap.children].forEach(c=>c.classList.remove("sel")); b.classList.add("sel"); enableCheck(); }; wrap.appendChild(b); });
  setCheck(()=>{ const right=sel===q.answer; [...wrap.children].forEach(c=>{ const t=c.textContent.replace(/^\d/,"").trim(); if(t===q.answer) c.classList.add("right"); else if(t===sel) c.classList.add("wrong"); c.style.pointerEvents="none"; }); return {right,correct:q.gender?(q.answer+" "+q.gender.noun):q.answer}; },()=>sel!==null);
}
function renderBank(q,body){
  body.innerHTML=`${audioControls(q,true)}<div class="phrase">${q.prompt}</div><div class="answer-area" id="ans"></div><div class="bank" id="bank"></div>`; wireAudio(q);
  const ans=document.getElementById("ans"),bank=document.getElementById("bank");
  q.tiles.forEach(w=>{ const t=document.createElement("button"); t.className="tile"; t.textContent=w; t.onclick=()=>{ t.classList.add("used"); const a=document.createElement("button"); a.className="tile"; a.textContent=w; a.onclick=()=>{ a.remove(); t.classList.remove("used"); enableCheck(); }; ans.appendChild(a); enableCheck(); }; bank.appendChild(t); });
  setCheck(()=>{ const got=[...ans.children].map(c=>c.textContent); return {right:got.join(" ")===q.answer.join(" "),correct:q.answer.join(" ")}; },()=>ans.children.length>0);
}
function renderType(q,body){
  const head=q.dictation?`${audioControls(q,true)}<div class="ctx">${q.hint}</div>`:`${audioControls(q,true)}<div class="phrase">${q.prompt}</div>`;
  body.innerHTML=`${head}<div class="tip">Accents &amp; capitals optional (caffe = caffè).</div><input class="type" id="typed" placeholder="Type here…" autocomplete="off" autocapitalize="off"/>`;
  wireAudio(q); if(q.dictation) speak(q.speak);
  const inp=document.getElementById("typed"); inp.oninput=()=>{ inp.value.trim()?enableCheck():disableCheck(); }; inp.onkeydown=e=>{ if(e.key==="Enter"&&!document.getElementById("checkBtn").disabled) doCheck(); }; inp.focus();

function renderMatch(q,body){
  const left=shuffle(q.pairs.map(p=>p.it)),right=shuffle(q.pairs.map(p=>p.en));
  body.innerHTML=`<div class="match-grid" id="mg"></div>`; const mg=document.getElementById("mg");
  const make=(t,s)=>{ const b=document.createElement("button"); b.textContent=t; b.dataset.side=s; b.dataset.text=t; return b; };
  const items=[]; for(let i=0;i<q.pairs.length;i++){ items.push(make(left[i],"it")); items.push(make(right[i],"en")); }
  let selBtn=null,solved=0;
  items.forEach(b=>{ b.onclick=()=>{ if(b.dataset.side==="it") speak(b.dataset.text);
    if(selBtn===b){ b.classList.remove("sel"); selBtn=null; return; }
    if(!selBtn){ selBtn=b; b.classList.add("sel"); return; }
    if(selBtn.dataset.side===b.dataset.side){ selBtn.classList.remove("sel"); selBtn=b; b.classList.add("sel"); return; }
    const itTxt=selBtn.dataset.side==="it"?selBtn.dataset.text:b.dataset.text,enTxt=selBtn.dataset.side==="en"?selBtn.dataset.text:b.dataset.text;
    if(q.pairs.some(p=>p.it===itTxt&&p.en===enTxt)){ selBtn.classList.add("gone"); b.classList.add("gone"); selBtn.classList.remove("sel"); selBtn=null; solved++; if(solved===q.pairs.length) enableCheck(); }
    else { const a=selBtn; a.classList.add("wrong-flash"); b.classList.add("wrong-flash"); setTimeout(()=>{a.classList.remove("sel","wrong-flash"); b.classList.remove("wrong-flash");},400); selBtn=null; toast("Not a match"); }
  }; mg.appendChild(b); });
  setCheck(()=>({right:true,correct:""}),()=>solved===q.pairs.length);
}

    rec.onresult=e=>{ const alts=[...e.results[0]].map(r=>r.transcript); const norm=s=>s.toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[.,!?;']/g,"").trim(); const target=norm(q.answer); const tWords=target.split(/\s+/); let best=0,heard=alts[0]; alts.forEach(a=>{ const aw=norm(a).split(/\s+/); const matched=tWords.filter(w=>aw.includes(w)).length; const score=matched/tWords.length; if(score>best){best=score;heard=a;} if(norm(a)===target) best=1; }); mic.classList.remove("live"); const ok=best>=0.6; const h=document.getElementById("heard"); h.style.display="block"; h.innerHTML=`You said: <b>${heard}</b>`; evalSpeak(ok,q,"Heard: "+heard); };

let _checkFn=null,_canCheck=null;
function setCheck(fn,can){ _checkFn=fn; _canCheck=can; const cb=document.getElementById("checkBtn"); if(cb) cb.onclick=doCheck; }
function enableCheck(){ if(_canCheck&&_canCheck()){ const b=document.getElementById("checkBtn"); if(b) b.disabled=false; } }
function disableCheck(){ const b=document.getElementById("checkBtn"); if(b) b.disabled=true; }
function doCheck(){ const {right,correct}=_checkFn(),q=L.queue[L.i];
  if(right) L.correct++; else { L.mistakes++; if(HEART_MODES.includes(L.mode)){ if(S.hearts===5)S.lastHeart=Date.now(); S.hearts=Math.max(0,S.hearts-1); } L.wrongQ.push(q); }

function showResult(right,correct){ sfx(right?"correct":"wrong"); const foot=document.getElementById("foot"); foot.className="foot show-result "+(right?"correct":"incorrect");
  foot.innerHTML=`<div class="result-msg ${right?'correct':'incorrect'}">${right?"✅ Bravo!":"❌ Correct answer:"}${right?"":`<span class="sub">${correct}</span>`}</div><button class="btn ${right?'':'red'}" id="contBtn">Continue</button>`;
  document.getElementById("contBtn").onclick=next; }
function next(){ L.i++; if(noHearts()&&HEART_MODES.includes(L.mode)) return failScreen();
  if(L.i>=L.queue.length){ if(L.wrongQ.length){ L.queue.push(...L.wrongQ); L.wrongQ=[]; renderQuestion(); return; } return completeSession(); } renderQuestion(); }

function refreshBadges(){ const rb=document.querySelector('#nav button[data-view="review"]'); const old=rb.querySelector(".ndot"); if(old) old.remove(); const d=dueCount(); if(d>0){ const s=document.createElement("span"); s.className="ndot"; s.textContent=d; rb.appendChild(s); } }
document.querySelectorAll("#nav button").forEach(b=>{ b.onclick=()=>{ const v=b.dataset.view; setNav(v); if(v==="home") goHome(); else if(v==="learn") showLearn(); else if(v==="train") showTrain(); else if(v==="review") startReview(); else if(v==="stats") showStats(); }; });

/* ---------- util ---------- */
function shuffle(a){ a=[...a]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
let _tt; function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove("show"),1800); }
if("speechSynthesis" in window){ speechSynthesis.onvoiceschanged=loadVoices; loadVoices(); }

/* ---------- sound effects (synthesized, no files) ---------- */
let AC=null;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function tone(freq,start,dur,type,vol){ const c=ac(); if(!c) return; const o=c.createOscillator(),g=c.createGain(); o.type=type||"sine"; o.frequency.value=freq; const t=c.currentTime+start; o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol||.15,t+.02); g.gain.exponentialRampToValueAtTime(.0001,t+dur); o.start(t); o.stop(t+dur+.02); }
function sfx(kind){ if(!S.sound) return; const c=ac(); if(!c) return; if(c.state==="suspended") c.resume();
  if(kind==="correct"){ tone(660,0,.12,"triangle",.18); tone(880,.09,.16,"triangle",.18); }
  else if(kind==="wrong"){ tone(196,0,.22,"sawtooth",.12); tone(146,.08,.26,"sawtooth",.12); }
  else if(kind==="complete"){ [523,659,784,1047].forEach((f,i)=>tone(f,i*.11,.3,"triangle",.18)); }
  else if(kind==="tap"){ tone(440,0,.06,"sine",.08); } }

/* ---------- confetti ---------- */
function confetti(){ const cv=document.getElementById("confetti"); if(!cv) return; const dpr=window.devicePixelRatio||1;
  cv.style.display="block"; cv.width=innerWidth*dpr; cv.height=innerHeight*dpr; const x=cv.getContext("2d"); x.scale(dpr,dpr);
  const cols=["#58cc02","#1cb0f6","#ffc800","#ce82ff","#ff4b4b","#009246","#ce2b37"];
  const N=140, P=[]; for(let i=0;i<N;i++){ P.push({x:innerWidth/2,y:innerHeight*.35,vx:(Math.random()-.5)*11,vy:Math.random()*-13-4,g:.35+Math.random()*.2,s:6+Math.random()*7,c:cols[i%cols.length],r:Math.random()*6,vr:(Math.random()-.5)*.4,a:1}); }
  let f=0; (function loop(){ f++; x.clearRect(0,0,innerWidth,innerHeight); let alive=false;
    P.forEach(p=>{ p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.r+=p.vr; if(f>60)p.a-=.02; if(p.a>0&&p.y<innerHeight+40){ alive=true; x.save(); x.globalAlpha=Math.max(0,p.a); x.translate(p.x,p.y); x.rotate(p.r); x.fillStyle=p.c; x.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); x.restore(); } });
    if(alive&&f<160) requestAnimationFrame(loop); else cv.style.display="none"; })();
}

if("serviceWorker" in navigator){ window.addEventListener("load",()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); }); }

applyTheme(); renderHome();
